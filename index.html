<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت لوتوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @media print { 
            .print\:hidden { display: none !important; } 
            .print\:block { display: block !important; } 
            @page { margin: 15mm; size: A4; } 
        }
        body { font-family: system-ui, -apple-system, sans-serif; }
        .dim-input { width: 50px; text-align: center; padding: 2px 4px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.875rem;}
        
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCXfQHRm1bEP-pH-mXvdpRvoK3HTgOiG8M",
            authDomain: "logistics-app-7f2af.firebaseapp.com",
            projectId: "logistics-app-7f2af",
            storageBucket: "logistics-app-7f2af.firebasestorage.app",
            messagingSenderId: "935747514113",
            appId: "1:935747514113:web:ad11525289ccf2e9a93500"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'logistics-app-v1';
        const getCollection = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

        const currencies = { USD: { symbol: '$', name: 'USD ($)' }, CNY: { symbol: '¥', name: 'CNY (¥)' }, IRR: { symbol: '﷼', name: 'IRR (﷼)' } };
        const emptyItem = () => ({ id: Date.now(), name: '', price: '', qtyPerCtn: '', ctnCount: '', l: '', w: '', h: '', nwPerCtn: '', gwPerCtn: '' });

        const translations = {
            en: {
                dir: 'ltr', title: 'Lotus Panel', dashboard: 'Dashboard', newDoc: 'New Document', history: 'Document History', customers: 'Customers List', logout: 'Logout',
                companyDetails: 'Company Details', companyName: 'Company Name', companyAddress: 'Address',
                customerDetails: 'Customer Details', customerName: 'Customer Name', customerPhone: 'Phone', customerAddress: 'Address', billTo: 'Bill To:',
                settings: 'Document Settings', currency: 'Currency', language: 'Language', commission: 'Commission (%)',
                items: 'Item Entries', addItem: 'Add Item', itemName: 'Item Name', unitPrice: 'Unit Price', qtyPerCtn: 'Qty/CTN', ctnCount: 'No. CTN',
                dimensions: 'Dimensions (L×W×H cm)', nwPerCtn: 'NW/CTN (kg)', gwPerCtn: 'GW/CTN (kg)', actions: 'Actions',
                summary: 'Summary', subtotal: 'Subtotal', commAmount: 'Commission', grandTotal: 'Grand Total',
                totalQty: 'Total Quantity', totalCtns: 'Total Cartons', totalCBM: 'Total CBM (m³)', totalNW: 'Total Net Weight', totalGW: 'Total Gross Weight',
                printInvoice: 'Print Invoice', printPacking: 'Print Packing List', invoiceTitle: 'COMMERCIAL INVOICE', packingTitle: 'PACKING LIST',
                saveBtn: 'Save to Database', updateBtn: 'Update Document', savedSuccess: 'Document saved successfully.',
                loginTitle: 'Lotus Login', loginSub: 'Enter your username and password', userLabel: 'Username', passLabel: 'Password', loginBtn: 'Login'
            },
            fa: {
                dir: 'rtl', title: 'پنل لوتوس', dashboard: 'داشبورد', newDoc: 'ثبت سند جدید', history: 'تاریخچه اسناد', customers: 'لیست مشتریان', logout: 'خروج از حساب',
                companyDetails: 'مشخصات شرکت', companyName: 'نام شرکت', companyAddress: 'آدرس شرکت',
                customerDetails: 'مشخصات مشتری', customerName: 'نام مشتری', customerPhone: 'شماره تلفن', customerAddress: 'آدرس مشتری', billTo: 'صورت‌حساب به:',
                settings: 'تنظیمات مالی', currency: 'ارز', language: 'زبان', commission: 'کارمزد (%)',
                items: 'لیست اقلام', addItem: 'افزودن کالا', itemName: 'نام کالا', unitPrice: 'قیمت واحد', qtyPerCtn: 'تعداد/کارتن', ctnCount: 'تعداد کارتن',
                dimensions: 'ابعاد (طول×عرض×ارتفاع cm)', nwPerCtn: 'وزن خالص/کارتن(kg)', gwPerCtn: 'وزن ناخالص/کارتن(kg)', actions: 'عملیات',
                summary: 'خلاصه', subtotal: 'جمع کل اقلام', commAmount: 'مبلغ کارمزد', grandTotal: 'جمع نهایی',
                totalQty: 'تعداد کل', totalCtns: 'جمع کارتن‌ها', totalCBM: 'حجم کل (CBM)', totalNW: 'وزن خالص کل', totalGW: 'وزن ناخالص کل',
                printInvoice: 'چاپ فاکتور', printPacking: 'چاپ پکینگ لیست', invoiceTitle: 'فاکتور تجاری', packingTitle: 'پکینگ لیست',
                saveBtn: 'ذخیره در دیتابیس', updateBtn: 'بروزرسانی سند', savedSuccess: 'سند با موفقیت ذخیره شد.',
                loginTitle: 'ورود به پنل لوتوس', loginSub: 'لطفاً نام کاربری و رمز عبور خود را وارد کنید', userLabel: 'نام کاربری', passLabel: 'رمز عبور', loginBtn: 'ورود'
            },
            zh: {
                dir: 'ltr', title: 'Lotus 面板', dashboard: '仪表板', newDoc: '新文件', history: '历史记录', customers: '客户列表', logout: '登出',
                companyDetails: '公司信息', companyName: '公司名称', companyAddress: '地址',
                customerDetails: '客户信息', customerName: '客户姓名', customerPhone: '电话', customerAddress: '地址', billTo: '账单接收人:',
                settings: '文档设置', currency: '货币', language: '语言', commission: '佣金 (%)',
                items: '项目列表', addItem: '添加项目', itemName: '项目名称', unitPrice: '单价', qtyPerCtn: '每箱数量', ctnCount: '箱数',
                dimensions: '尺寸 (长×宽×高 cm)', nwPerCtn: '每箱净重 (kg)', gwPerCtn: '每箱毛重 (kg)', actions: '操作',
                summary: '摘要', subtotal: '小计', commAmount: '佣金', grandTotal: '总计',
                totalQty: '总数量', totalCtns: '总箱数', totalCBM: '总体积 (CBM)', totalNW: '总净重', totalGW: '总毛重',
                printInvoice: '打印发票', printPacking: '打印装箱单', invoiceTitle: '商业发票', packingTitle: '装箱单',
                saveBtn: '保存到数据库', updateBtn: '更新文件', savedSuccess: '文件保存成功。',
                loginTitle: 'Lotus 登录', loginSub: '请输入您的用户名和密码', userLabel: '用户名', passLabel: '密码', loginBtn: '登录'
            }
        };

        function App() {
            // --- Global State ---
            const [user, setUser] = useState(null);
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(true);

            // --- App State ---
            const [activeTab, setActiveTab] = useState('new');
            const [invoices, setInvoices] = useState([]);
            const [customersList, setCustomersList] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [lang, setLang] = useState('fa');

            // --- Form State ---
            const [currentInvoiceId, setCurrentInvoiceId] = useState(null);
            const [invoiceNo, setInvoiceNo] = useState('');
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [currency, setCurrency] = useState('USD');
            const [commission, setCommission] = useState('');
            const [company, setCompany] = useState({ name: '', address: '' });
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [items, setItems] = useState([emptyItem()]);
            const [printType, setPrintType] = useState('invoice');
            const [editingCustomer, setEditingCustomer] = useState({ id: null, name: '', phone: '', address: '' });

            const t = translations[lang];

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const unsubInvoices = onSnapshot(getCollection('invoices'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setInvoices(data);
                    
                    if (!currentInvoiceId) {
                         if (data.length > 0) {
                             const maxNo = Math.max(...data.map(i => Number(i.invoiceNo) || 0));
                             setInvoiceNo(maxNo >= 2026001 ? maxNo + 1 : 2026001);
                         } else {
                             setInvoiceNo(2026001);
                         }
                    }
                });

                const unsubCustomers = onSnapshot(getCollection('customers'), (snapshot) => {
                    setCustomersList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubInvoices(); unsubCustomers(); };
            }, [user, currentInvoiceId]);

            const login = async (e) => {
                e.preventDefault();
                setError('');
                try {
                    // تنظیم حالت نشست (پاک شدن لاگین با بستن تب یا مرورگر)
                    await setPersistence(auth, browserSessionPersistence);
                    
                    // Append @lotus.com automatically behind the scenes
                    await signInWithEmailAndPassword(auth, `${u}@lotus.com`, p);
                } catch { 
                    setError(lang === 'fa' ? 'نام کاربری یا رمز عبور اشتباه است' : 'Invalid username or password'); 
                }
            };

            const resetForm = () => {
                setCurrentInvoiceId(null);
                setInvoiceDate(new Date().toISOString().split('T')[0]);
                setCompany({ name: '', address: '' });
                setCustomer({ name: '', phone: '', address: '' });
                setItems([emptyItem()]);
                setCurrency('USD');
                setCommission('');
            };

            const handleTabSwitch = (tab) => {
                if(tab === 'new') resetForm();
                setActiveTab(tab);
            };

            const handleItemChange = (id, field, value) => setItems(items.map(i => i.id === id ? { ...i, [field]: value } : i));
            const addItem = () => setItems([...items, emptyItem()]);
            const removeItem = (id) => { if (items.length > 1) setItems(items.filter(i => i.id !== id)); };

            const saveToFirebase = async () => {
                if (!invoiceNo) return alert(lang === 'fa' ? "شماره فاکتور الزامی است" : "Invoice number is required");
                try {
                    if (customer.name) {
                        const existingCust = customersList.find(c => c.name === customer.name);
                        if (existingCust) {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', existingCust.id), customer, { merge: true });
                        } else {
                            await addDoc(getCollection('customers'), customer);
                        }
                    }

                    const payload = {
                        invoiceNo, date: invoiceDate, timestamp: Date.now(), company, customer, items,
                        settings: { currency, commission }, totalAmount: totals.grandTotal, creatorId: user.uid
                    };

                    if (currentInvoiceId) {
                        // Update existing document
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', currentInvoiceId), payload, { merge: true });
                    } else {
                        // Create new document
                        await addDoc(getCollection('invoices'), payload);
                    }
                    
                    alert(t.savedSuccess);
                    setActiveTab('invoices');
                } catch (error) {
                    console.error(error);
                    alert("Error saving data.");
                }
            };

            const loadRecord = (record) => {
                setCurrentInvoiceId(record.id); // This ensures the next save updates this exact record
                setInvoiceNo(record.invoiceNo || '');
                setInvoiceDate(record.date || new Date().toISOString().split('T')[0]);
                setCompany(record.company || {name:'', address:''});
                setCustomer(record.customer || {name:'', phone:'', address:''});
                setItems(record.items || []);
                setCurrency(record.settings?.currency || 'USD');
                setCommission(record.settings?.commission || '');
                setActiveTab('new');
            };

            const handleCustomerSelect = (selectedName) => {
                const cust = customersList.find(c => c.name === selectedName);
                if(cust) setCustomer({ name: cust.name, phone: cust.phone || '', address: cust.address || '' });
            };

            const handlePrint = (type) => {
                setPrintType(type);
                setTimeout(() => window.print(), 100); 
            };

            const saveCustomerToCRM = async () => {
                if (!editingCustomer.name) return;
                try {
                    if (editingCustomer.id) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingCustomer.id), { name: editingCustomer.name, phone: editingCustomer.phone, address: editingCustomer.address }, { merge: true });
                    } else {
                        await addDoc(getCollection('customers'), { name: editingCustomer.name, phone: editingCustomer.phone, address: editingCustomer.address });
                    }
                    setEditingCustomer({ id: null, name: '', phone: '', address: '' });
                } catch (e) {
                    console.error(e);
                }
            };

            const totals = useMemo(() => {
                let subtotal = 0, totalQty = 0, totalCtns = 0, totalCBM = 0, totalNW = 0, totalGW = 0;
                items.forEach(i => {
                    const q = Number(i.qtyPerCtn) || 0;
                    const c = Number(i.ctnCount) || 0;
                    const p = Number(i.price) || 0;
                    const qty = q * c;
                    totalQty += qty; subtotal += qty * p; totalCtns += c;
                    totalCBM += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
                    totalNW += (Number(i.nwPerCtn)||0) * c; totalGW += (Number(i.gwPerCtn)||0) * c;
                });
                const commAmount = subtotal * ((Number(commission)||0) / 100);
                return { subtotal, commAmount, grandTotal: subtotal + commAmount, totalQty, totalCtns, totalCBM, totalNW, totalGW };
            }, [items, commission]);

            const formatMoney = (amount) => `${currencies[currency]?.symbol || '$'} ${amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            const filteredInvoices = invoices.filter(inv => 
                (inv.customer?.name || '').includes(searchQuery) ||
                (inv.invoiceNo || '').toString().includes(searchQuery) ||
                (inv.date || '').includes(searchQuery)
            );

            if (loading) return <div className="flex h-screen items-center justify-center bg-slate-900 text-white">Loading...</div>;

            if (!user) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900" dir={t.dir}>
                        <form onSubmit={login} className="bg-white p-8 rounded-2xl w-96 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                            
                            <div className="flex justify-end mb-4">
                                <select value={lang} onChange={(e) => setLang(e.target.value)} className="text-xs border rounded px-2 py-1 bg-slate-50 outline-none">
                                    <option value="fa">فارسی</option><option value="en">English</option><option value="zh">中文</option>
                                </select>
                            </div>

                            <div className="text-center mb-8">
                                <h1 className="text-2xl font-bold text-slate-800">{t.loginTitle}</h1>
                                <p className="text-sm text-slate-500 mt-2">{t.loginSub}</p>
                            </div>
                            
                            {error && <div className="bg-red-50 text-red-500 text-sm p-3 rounded mb-4 text-center border border-red-200">{error}</div>}
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">{t.userLabel}</label>
                                    <input type="text" onChange={e => setU(e.target.value)} className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" dir="ltr" placeholder="username" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">{t.passLabel}</label>
                                    <input type="password" onChange={e => setP(e.target.value)} className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" dir="ltr" placeholder="••••••••" />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition shadow-lg mt-2">{t.loginBtn}</button>
                            </div>
                        </form>
                    </div>
                );
            }

            return (
                <div className="font-sans" dir={t.dir}>
                    {/* UI Screen */}
                    <div className="flex h-screen bg-slate-50 print:hidden">
                        
                        {/* Sidebar */}
                        <aside className="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-10">
                            <div className="p-6">
                                <h1 className="text-2xl font-bold text-blue-400 flex items-center gap-2">
                                    <i className="fa-solid fa-bolt text-yellow-400"></i> {t.title}
                                </h1>
                            </div>
                            <nav className="space-y-1 flex-grow px-4 mt-4">
                                <button onClick={() => handleTabSwitch('dashboard')} className={`block w-full text-${t.dir==='rtl'?'right':'left'} p-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}><i className={`fa-solid fa-chart-pie w-6 text-center ${t.dir==='rtl'?'ml-2':'mr-2'}`}></i> {t.dashboard}</button>
                                <button onClick={() => handleTabSwitch('new')} className={`block w-full text-${t.dir==='rtl'?'right':'left'} p-3 rounded-lg transition-colors ${activeTab === 'new' ? 'bg-blue-600 shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}><i className={`fa-solid fa-file-invoice w-6 text-center ${t.dir==='rtl'?'ml-2':'mr-2'}`}></i> {t.newDoc}</button>
                                <button onClick={() => handleTabSwitch('invoices')} className={`block w-full text-${t.dir==='rtl'?'right':'left'} p-3 rounded-lg transition-colors ${activeTab === 'invoices' ? 'bg-blue-600 shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}><i className={`fa-solid fa-folder-open w-6 text-center ${t.dir==='rtl'?'ml-2':'mr-2'}`}></i> {t.history}</button>
                                <button onClick={() => handleTabSwitch('customers')} className={`block w-full text-${t.dir==='rtl'?'right':'left'} p-3 rounded-lg transition-colors ${activeTab === 'customers' ? 'bg-blue-600 shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}><i className={`fa-solid fa-users w-6 text-center ${t.dir==='rtl'?'ml-2':'mr-2'}`}></i> {t.customers}</button>
                            </nav>
                            
                            <div className="px-4 mt-auto mb-4">
                                <select value={lang} onChange={(e) => setLang(e.target.value)} className="w-full bg-slate-800 text-slate-300 border border-slate-700 rounded-lg p-3 outline-none cursor-pointer hover:bg-slate-700 transition">
                                    <option value="fa">🇮🇷 فارسی</option>
                                    <option value="en">🇺🇸 English</option>
                                    <option value="zh">🇨🇳 中文</option>
                                </select>
                            </div>
                            
                            <div className="p-4 border-t border-slate-800">
                                <button onClick={() => signOut(auth)} className="flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 p-3 rounded-lg text-sm font-bold w-full transition">
                                    <i className="fa-solid fa-arrow-right-from-bracket"></i> {t.logout}
                                </button>
                            </div>
                        </aside>

                        {/* Main Content Area */}
                        <main className="flex-1 p-8 overflow-y-auto relative">
                            
                            {/* --- Dashboard Tab --- */}
                            {activeTab === 'dashboard' && (
                                <div className="pt-2">
                                    <h2 className="text-3xl font-bold mb-8 text-slate-800">{t.dashboard}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                                            <div className="text-slate-500 mb-2 text-lg font-medium">کل اسناد صادر شده</div>
                                            <div className="text-5xl font-bold text-blue-600">{invoices.length}</div>
                                        </div>
                                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                                            <div className="text-slate-500 mb-2 text-lg font-medium">مشتریان ثبت شده</div>
                                            <div className="text-5xl font-bold text-emerald-600">{customersList.length}</div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* --- Customers Tab --- */}
                            {activeTab === 'customers' && (
                                <div className="max-w-5xl pt-2">
                                    <h2 className="text-3xl font-bold mb-8 text-slate-800">{t.customers}</h2>
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8">
                                        <div className="flex gap-4 items-end flex-wrap">
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm font-medium text-slate-700 mb-1">{t.customerName}</label>
                                                <input type="text" value={editingCustomer.name} onChange={e => setEditingCustomer({...editingCustomer, name: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm font-medium text-slate-700 mb-1">{t.customerPhone}</label>
                                                <input type="text" value={editingCustomer.phone} onChange={e => setEditingCustomer({...editingCustomer, phone: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm font-medium text-slate-700 mb-1">{t.customerAddress}</label>
                                                <input type="text" value={editingCustomer.address} onChange={e => setEditingCustomer({...editingCustomer, address: e.target.value})} className="w-full border border-slate-300 rounded-lg px-4 py-2.5 outline-none focus:ring-2 focus:ring-blue-500" />
                                            </div>
                                            <button onClick={saveCustomerToCRM} className="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-lg h-[46px] shadow-sm transition">
                                                {editingCustomer.id ? 'بروزرسانی' : 'ثبت جدید'}
                                            </button>
                                            {editingCustomer.id && (

                                                    <td className="py-3 px-2 text-center font-bold text-gray-900 bg-gray-50/50">{itemCBM > 0 ? itemCBM.toFixed(3) : '-'}</td>
                                                    <td className="py-3 px-2 text-right text-gray-600">{((Number(i.nwPerCtn)||0) * c).toFixed(2)}</td>
                                                    <td className="py-3 px-2 text-right font-bold text-gray-800">{((Number(i.gwPerCtn)||0) * c).toFixed(2)}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                                
                                <div className="flex justify-end mt-12">
                                    <table className="w-80 text-sm border-2 border-gray-800">
                                        <tbody>
                                            <tr className="border-b border-gray-300"><td className="py-2.5 px-4 bg-gray-50 text-gray-600">{t.totalCtns}:</td><td className="py-2.5 px-4 text-right font-bold text-gray-900">{totals.totalCtns}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2.5 px-4 bg-gray-50 text-gray-600">{t.totalQty}:</td><td className="py-2.5 px-4 text-right font-bold text-gray-900">{totals.totalQty}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2.5 px-4 bg-gray-50 text-gray-600">{t.totalNW}:</td><td className="py-2.5 px-4 text-right font-bold text-gray-900">{totals.totalNW.toFixed(2)} kg</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2.5 px-4 bg-gray-50 text-gray-600">{t.totalGW}:</td><td className="py-2.5 px-4 text-right font-bold text-gray-900">{totals.totalGW.toFixed(2)} kg</td></tr>
                                            <tr><td className="py-3 px-4 bg-gray-800 text-white font-bold uppercase tracking-wider">{t.totalCBM}:</td><td className="py-3 px-4 text-right font-black text-xl text-gray-900 bg-gray-100">{totals.totalCBM.toFixed(3)} m³</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
