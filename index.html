            const [purchaseInvoices, setPurchaseInvoices] = useState([]);
            const [customersList, setCustomersList] = useState([]);

            const [transactions, setTransactions] = useState([]);
            const [expensesList, setExpensesList] = useState([]);
            
            const [activeTab, setActiveTab] = useState('new');
            const [searchQuery, setSearchQuery] = useState('');
            const [lang, setLang] = useState('fa');
            const [exchangeRate, setExchangeRate] = useState({ usdToCny: null, loading: true });

            // Sales Form
            const [currentInvoiceId, setCurrentInvoiceId] = useState(null);
            const [invoiceNo, setInvoiceNo] = useState('');
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [currency, setCurrency] = useState('USD');
            const [commission, setCommission] = useState('');
            const [company, setCompany] = useState({ name: '', address: '' });
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [items, setItems] = useState([emptyItem()]);
            const [incoterm, setIncoterm] = useState('FOB');
            const [deliveryTime, setDeliveryTime] = useState('');
            const [port, setPort] = useState('');
            const [remarks, setRemarks] = useState('');
            const [selectedTerms, setSelectedTerms] = useState([]);
            const [linkedPIs, setLinkedPIs] = useState([]);

            // Purchase Form
            const [currentPurchaseId, setCurrentPurchaseId] = useState(null);
            const [purchaseNo, setPurchaseNo] = useState('');
            const [purchaseDate, setPurchaseDate] = useState(new Date().toISOString().split('T')[0]);
            const [purchaseCurrency, setPurchaseCurrency] = useState('CNY');
            const [supplier, setSupplier] = useState({ name: '', phone: '', address: '' });
            const [purchaseItems, setPurchaseItems] = useState([emptyItem()]);
            
            // Financial Forms
            const [paymentForm, setPaymentForm] = useState({ customerName: '', amount: '', currency: 'USD', date: new Date().toISOString().split('T')[0], description: '', type: 'receive' });
            const [expenseForm, setExpenseForm] = useState({ title: '', amount: '', currency: 'USD', date: new Date().toISOString().split('T')[0] });

            const [printType, setPrintType] = useState('invoice');
            const t = translations[lang];

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                
                fetch('https://api.exchangerate-api.com/v4/latest/USD')
                    .then(res => res.json())
                    .then(data => { if(data?.rates?.CNY) setExchangeRate({ usdToCny: data.rates.CNY, loading: false }); })
                    .catch(() => setExchangeRate({ usdToCny: '-', loading: false }));

                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubInvoices = onSnapshot(getCollection('invoices'), snap => {
                    const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setInvoices(data);
                    if (!currentInvoiceId && activeTab === 'new') {
                         setInvoiceNo(data.length > 0 ? Math.max(...data.map(i => Number(i.invoiceNo) || 0)) + 1 : 2026001);
                    }
                });
                const unsubPurchases = onSnapshot(getCollection('purchaseInvoices'), snap => setPurchaseInvoices(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a,b) => b.timestamp - a.timestamp)));
                const unsubCustomers = onSnapshot(getCollection('customers'), snap => setCustomersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubSuppliers = onSnapshot(getCollection('suppliers'), snap => setSuppliersList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))));
                const unsubTransactions = onSnapshot(getCollection('transactions'), snap => setTransactions(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => b.timestamp - a.timestamp)));
                const unsubExpenses = onSnapshot(getCollection('expenses'), snap => setExpensesList(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => b.timestamp - a.timestamp)));

                return () => { unsubInvoices(); unsubPurchases(); unsubCustomers(); unsubSuppliers(); unsubTransactions(); unsubExpenses(); };
            }, [user, currentInvoiceId, activeTab]);

            const login = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, `${u}@lotus.com`, p);
                } catch { 
                    setLoginError(lang === 'fa' ? 'نام کاربری یا رمز عبور اشتباه است' : 'Invalid username or password'); 
                }

                setCurrentInvoiceId(null);
                setInvoiceDate(new Date().toISOString().split('T')[0]);
                setCompany({ name: '', address: '' });
                setCustomer({ name: '', phone: '', address: '' });
                setItems([emptyItem()]);
                setCurrency('USD');
                setCommission('');
                setIncoterm('FOB');
                setDeliveryTime('');
                setPort('');
                setRemarks('');
                setSelectedTerms([]);
                setLinkedPIs([]);
            };

            const resetPurchaseForm = () => {
                setCurrentPurchaseId(null);
                setPurchaseNo(Date.now().toString().slice(-6));
                setPurchaseDate(new Date().toISOString().split('T')[0]);
                setSupplier({ name: '', phone: '', address: '' });
                setPurchaseItems([emptyItem()]);
                setPurchaseCurrency('CNY');
            };

            const handleTabSwitch = (tab) => {
                if(tab === 'new') resetForm();
                if(tab === 'newPurchase') resetPurchaseForm();
                setActiveTab(tab);
            };

            const toggleTerm = (index) => {
                if (selectedTerms.includes(index)) setSelectedTerms(selectedTerms.filter(i => i !== index));
                else setSelectedTerms([...selectedTerms, index]);
            };

            const handleItemChange = (id, field, value) => setItems(items.map(i => i.id === id ? { ...i, [field]: value } : i));
            const handlePurchaseItemChange = (id, field, value) => setPurchaseItems(purchaseItems.map(i => i.id === id ? { ...i, [field]: value } : i));
            
            const addItem = () => setItems([...items, emptyItem()]);
            const addPurchaseItem = () => setPurchaseItems([...purchaseItems, emptyItem()]);
            
            const removeItem = (id) => { if (items.length > 1) setItems(items.filter(i => i.id !== id)); };
            const removePurchaseItem = (id) => { if (purchaseItems.length > 1) setPurchaseItems(purchaseItems.filter(i => i.id !== id)); };

            const toggleLinkPI = (piId) => {
                if (linkedPIs.includes(piId)) {
                    setLinkedPIs(linkedPIs.filter(id => id !== piId));
                } else {
                    const pi = purchaseInvoices.find(p => p.id === piId);
                    if (pi && pi.items) {
                        const itemsToCopy = pi.items.map(item => ({ ...item, id: Date.now() + Math.random(), price: '' }));
                        setItems(prev => [...prev.filter(i => i.name !== ''), ...itemsToCopy]);
                    }
                    setLinkedPIs([...linkedPIs, piId]);
                }
            };

            const saveToFirebase = async () => {
                if (!invoiceNo) return showModal('error', 'خطا', lang === 'fa' ? "شماره فاکتور الزامی است" : "Invoice number is required");
                if (!currentInvoiceId && invoices.find(inv => String(inv.invoiceNo) === String(invoiceNo))) {
                    return showModal('error', 'خطا', lang === 'fa' ? "این شماره فاکتور قبلاً ثبت شده است!" : "This invoice number already exists!");
                }

                try {
                    if (customer.name && !customersList.find(c => c.name === customer.name)) await addDoc(getCollection('customers'), customer);

                    const payload = {
                        invoiceNo, date: invoiceDate, timestamp: Date.now(), company, customer, items,
                        settings: { currency, commission }, trade: { incoterm, deliveryTime, port },
                        remarks, selectedTerms, linkedPIs, totalAmount: totals.grandTotal, creatorId: user.uid
                    };

                    if (currentInvoiceId) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', currentInvoiceId), payload, { merge: true });
                    else await addDoc(getCollection('invoices'), payload);
                    
                    showModal('success', 'موفقیت', t.savedSuccess);
                    setActiveTab('invoices');
                } catch (error) { showModal('error', 'خطا', "Error saving data."); }
            };

            const savePurchase = async () => {
                if (!purchaseNo) return showModal('error', 'خطا', lang === 'fa' ? 'شماره فاکتور خرید الزامی است' : 'Purchase number is required');
                try {
                    if (supplier.name && !suppliersList.find(s => s.name === supplier.name)) await addDoc(getCollection('suppliers'), supplier);
                    const payload = { purchaseNo, date: purchaseDate, timestamp: Date.now(), supplier, items: purchaseItems, currency: purchaseCurrency, totalAmount: purchaseTotals.subtotal, creatorId: user.uid };
                    
                    if (currentPurchaseId) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'purchaseInvoices', currentPurchaseId), payload, { merge: true });
                    else await addDoc(getCollection('purchaseInvoices'), payload);
                    
                    showModal('success', 'موفقیت', t.savedSuccess);
                    setActiveTab('purchaseHistory');
                } catch (error) { showModal('error', 'خطا', "Error saving data."); }
            };

            const requestDelete = (collectionName, id, displayNum) => {
                showModal('confirm', 'تایید حذف', lang === 'fa' ? `آیا از حذف آیتم ${displayNum} اطمینان دارید؟` : 'Are you sure you want to delete this item?', async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, id));
                        showModal('success', 'موفق', 'آیتم با موفقیت حذف شد.');
                    } catch (e) { showModal('error', 'خطا', 'مشکلی در حذف پیش آمد.'); }
                });
            };

            const loadRecord = (record) => {
                setCurrentInvoiceId(record.id); setInvoiceNo(record.invoiceNo || ''); setInvoiceDate(record.date || new Date().toISOString().split('T')[0]);
                setCompany(record.company || {name:'', address:''}); setCustomer(record.customer || {name:'', phone:'', address:''});
                setItems(record.items || [emptyItem()]); setCurrency(record.settings?.currency || record.currency || 'USD'); setCommission(record.settings?.commission || '');
                setIncoterm(record.trade?.incoterm || 'FOB'); setDeliveryTime(record.trade?.deliveryTime || ''); setPort(record.trade?.port || '');
                setRemarks(record.remarks || ''); setSelectedTerms(record.selectedTerms || []); setLinkedPIs(record.linkedPIs || []);
                setActiveTab('new');
            };

            const handlePrint = (type) => {
                setPrintType(type);
                setTimeout(() => window.print(), 100); 
            };

            const savePayment = async () => {
                if (!paymentForm.customerName || !paymentForm.amount) return showModal('error', 'خطا', lang === 'fa' ? 'نام طرف حساب و مبلغ الزامی است.' : 'Name and amount are required.');
                try {
                    await addDoc(getCollection('transactions'), { ...paymentForm, amount: Number(paymentForm.amount), timestamp: Date.now() });
                    showModal('success', 'موفقیت', t.savedSuccess);
                    setPaymentForm({ ...paymentForm, amount: '', description: '' });
                } catch(e) { showModal('error', 'خطا', 'خطا در ثبت تراکنش.'); }
            };

            const saveExpense = async () => {
                if (!expenseForm.title || !expenseForm.amount) return showModal('error', 'خطا', lang === 'fa' ? 'شرح هزینه و مبلغ الزامی است.' : 'Description and amount are required.');
                try {
                    await addDoc(getCollection('expenses'), { ...expenseForm, amount: Number(expenseForm.amount), timestamp: Date.now() });
                    showModal('success', 'موفقیت', t.savedSuccess);
                    setExpenseForm({ ...expenseForm, title: '', amount: '' });
                } catch(e) { showModal('error', 'خطا', 'خطا در ثبت هزینه.'); }
            };

            const totals = useMemo(() => {
                let subtotal = 0, totalQty = 0, totalCtns = 0, totalCBM = 0, totalNW = 0, totalGW = 0;
                items.forEach(i => {
                    const q = Number(i.qtyPerCtn) || 0, c = Number(i.ctnCount) || 0, p = Number(i.price) || 0, qty = q * c;
                    totalQty += qty; subtotal += qty * p; totalCtns += c;
                    totalCBM += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
                    totalNW += (Number(i.nwPerCtn)||0) * c; totalGW += (Number(i.gwPerCtn)||0) * c;
                });
                const commAmount = subtotal * ((Number(commission)||0) / 100);
                return { subtotal, commAmount, grandTotal: subtotal + commAmount, totalQty, totalCtns, totalCBM, totalNW, totalGW };
            }, [items, commission]);

            const purchaseTotals = useMemo(() => {
                let subtotal = 0;
                purchaseItems.forEach(i => { subtotal += (Number(i.qtyPerCtn)||0) * (Number(i.ctnCount)||0) * (Number(i.price)||0); });
                return { subtotal };
            }, [purchaseItems]);

            const dashboardStats = useMemo(() => {
                const stats = { USD: { sales: 0, purchases: 0, expenses: 0 }, CNY: { sales: 0, purchases: 0, expenses: 0 }, IRR: { sales: 0, purchases: 0, expenses: 0 } };
                let totalCBM = 0;
                invoices.forEach(inv => {
                    const cur = inv.settings?.currency || inv.currency || 'USD';
                    if (stats[cur]) stats[cur].sales += Number(inv.totalAmount) || 0;
                    (inv.items || []).forEach(i => totalCBM += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * (Number(i.ctnCount)||0));
                });
                purchaseInvoices.forEach(p => { if (stats[p.currency]) stats[p.currency].purchases += Number(p.totalAmount) || 0; });
                expensesList.forEach(e => { if (stats[e.currency]) stats[e.currency].expenses += Number(e.amount) || 0; });
                return { ...stats, totalCBM };
            }, [invoices, purchaseInvoices, expensesList]);

            const getCustomerBalance = (name) => {
                let balances = { USD: 0, CNY: 0, IRR: 0 };
                invoices.filter(i => i.customer?.name === name).forEach(i => balances[i.settings?.currency || i.currency || 'USD'] += (Number(i.totalAmount)||0));
                transactions.filter(t => t.customerName === name && t.type === 'receive').forEach(t => balances[t.currency || 'USD'] -= (Number(t.amount)||0));
                return balances;
            };

            const getSupplierBalance = (name) => {
                let balances = { USD: 0, CNY: 0, IRR: 0 };
                purchaseInvoices.filter(p => p.supplier?.name === name).forEach(p => balances[p.currency || 'CNY'] += (Number(p.totalAmount)||0));
                transactions.filter(t => t.customerName === name && t.type === 'pay').forEach(t => balances[t.currency || 'USD'] -= (Number(t.amount)||0));
                return balances;
            };

            const formatMoney = (amount, cur = currency) => `${currencies[cur]?.symbol || '$'} ${Number(amount).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}`;

            const filteredInvoices = invoices.filter(inv => 
                (inv.customer?.name || '').includes(searchQuery) || (inv.invoiceNo || '').toString().includes(searchQuery) ||
                (inv.items || []).some(i => (i.name || '').toLowerCase().includes(searchQuery.toLowerCase()))
            );
            
            const filteredPurchases = purchaseInvoices.filter(inv => 
                (inv.supplier?.name || '').includes(searchQuery) || (inv.purchaseNo || '').toString().includes(searchQuery) ||
                (inv.items || []).some(i => (i.name || '').toLowerCase().includes(searchQuery.toLowerCase()))
            );

            if (loading) return <div className="flex h-screen items-center justify-center bg-slate-900 text-white">Loading...</div>;

            if (!user) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900" dir={t.dir}>
                        <form onSubmit={login} className="bg-white p-8 rounded-2xl w-96 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                            <div className="text-center mb-8 mt-4"><h1 className="text-2xl font-bold text-slate-800">{t.loginTitle}</h1><p className="text-sm text-slate-500 mt-2">{t.loginSub}</p></div>
                            {loginError && <div className="bg-red-50 text-red-500 text-sm p-3 rounded mb-4 text-center border border-red-200">{loginError}</div>}
                            <div className="space-y-4">
                                <div><label className="block text-sm font-medium text-slate-700 mb-1">{t.userLabel}</label><input type="text" onChange={e => setU(e.target.value)} className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" dir="ltr" placeholder="admin" /></div>
                                <div><label className="block text-sm font-medium text-slate-700 mb-1">{t.passLabel}</label><input type="password" onChange={e => setP(e.target.value)} className="w-full border p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" dir="ltr" placeholder="••••••••" /></div>
                                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-bold transition shadow-lg mt-2">{t.loginBtn}</button>
                            </div>
                        </form>
                    </div>
                );
            }

            return (
                <div className="font-sans" dir={t.dir}>
                    {modal.isOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 print:hidden">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform transition-all">
                                <div className={`flex items-center gap-3 mb-4 ${modal.type === 'error' ? 'text-red-500' : modal.type === 'success' ? 'text-emerald-500' : 'text-blue-500'}`}>
                                    <i className={`fa-solid text-2xl ${modal.type === 'error' ? 'fa-circle-exclamation' : modal.type === 'success' ? 'fa-circle-check' : 'fa-circle-info'}`}></i>
                                    <h3 className="text-xl font-bold text-slate-800">{modal.title}</h3>
                                </div>
                                <p className="mb-8 text-slate-600 leading-relaxed font-medium">{modal.message}</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={closeModal} className="px-5 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-700 font-medium transition">{modal.type === 'confirm' ? t.cancel : 'OK'}</button>
                                    {modal.type === 'confirm' && <button onClick={() => { modal.onConfirm(); closeModal(); }} className="px-5 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium shadow-md transition">Confirm</button>}
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row h-screen bg-slate-50 print:hidden overflow-hidden">
                        {/* Sidebar (Mobile Responsive) */}
                        <aside className="w-full md:w-64 md:h-screen bg-slate-900 text-white flex flex-col shadow-2xl z-10 overflow-y-auto">
                            <div className="p-6 hidden md:block">
                                <h1 className="text-2xl font-bold text-blue-400 flex items-center gap-2"><i className="fa-solid fa-bolt text-yellow-400"></i> LOTUS ERP</h1>
                            </div>
                            <nav className="flex md:flex-col gap-2 p-4 md:p-0 md:px-4 md:mt-4 overflow-x-auto md:overflow-visible flex-nowrap min-w-max md:min-w-0 flex-grow">
                                {['dashboard', 'new', 'invoices', 'newPurchase', 'purchaseHistory', 'accounting', 'expenses', 'customers', 'suppliers'].map(tab => (
                                    <button key={tab} onClick={() => handleTabSwitch(tab)} className={`block text-${t.dir==='rtl'?'right':'left'} p-3 rounded-lg transition-colors whitespace-nowrap md:whitespace-normal ${activeTab === tab ? 'bg-blue-600 shadow-md' : 'hover:bg-slate-800 text-slate-300'}`}>
                                        {t[tab]}
                                    </button>
                                ))}
                            </nav>
                            {/* Lang/Logout - Visible on Mobile too! */}
                            <div className="px-4 mt-2 md:mt-auto mb-4 space-y-3">
                                <div className="bg-slate-800 p-3 rounded-lg border border-slate-700 mb-2 hidden md:block">
                                    <div className="text-xs text-slate-400 mb-1 flex items-center justify-between"><span>Rate (Live)</span><i className="fa-solid fa-bolt text-yellow-400"></i></div>
                                    <div className="text-sm font-bold text-slate-200" dir="ltr">{exchangeRate.loading ? 'Loading...' : `1 USD = ${exchangeRate.usdToCny} CNY`}</div>
                                </div>
                                <select value={lang} onChange={(e) => setLang(e.target.value)} className="w-full bg-slate-800 text-slate-300 border border-slate-700 rounded-lg p-2.5 text-sm outline-none cursor-pointer hover:bg-slate-700 transition">
                                    <option value="fa">🇮🇷 فارسی</option><option value="en">🇺🇸 English</option><option value="zh">🇨🇳 中文</option>
                                </select>
                                <button onClick={() => signOut(auth)} className="flex items-center justify-center gap-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 p-2.5 rounded-lg text-sm font-bold w-full transition">
                                    <i className="fa-solid fa-arrow-right-from-bracket"></i> {t.logout}
                                </button>
                            </div>
                        </aside>

                        {/* Main Content Area */}
                        <main className="flex-1 p-4 md:p-8 overflow-y-auto relative w-full">
                            
                            {/* --- Dashboard Tab --- */}
                            {activeTab === 'dashboard' && (
                                <div className="pt-2">
                                    <h2 className="text-3xl font-bold mb-8 text-slate-800">{t.pnlTitle}</h2>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                        {['USD', 'CNY', 'IRR'].map(cur => {
                                            const netProfit = dashboardStats[cur].sales - dashboardStats[cur].purchases - dashboardStats[cur].expenses;
                                            return (
                                            <div key={cur} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col justify-center">
                                                <h3 className="font-bold text-slate-800 border-b pb-3 mb-4" dir={t.dir}>{t.statsFor} {cur}</h3>
                                                <div className="space-y-3 mb-4 text-sm font-medium">
                                                    <div className="flex justify-between text-emerald-600"><span>{t.sales}</span><span dir="ltr">+{formatMoney(dashboardStats[cur].sales, cur)}</span></div>
                                                    <div className="flex justify-between text-red-500"><span>{t.purchases}</span><span dir="ltr">-{formatMoney(dashboardStats[cur].purchases, cur)}</span></div>
                                                    <div className="flex justify-between text-orange-500"><span>{t.expensesLabel}</span><span dir="ltr">-{formatMoney(dashboardStats[cur].expenses, cur)}</span></div>
                                                </div>
                                                <div className="flex justify-between items-center text-lg font-bold border-t border-slate-100 pt-4">
                                                    <span className="text-slate-700">{t.netProfit}</span>
                                                    <span dir="ltr" className={netProfit >= 0 ? 'text-emerald-600' : 'text-red-600'}>
                                                        {netProfit >= 0 ? '+' : ''}{formatMoney(netProfit, cur)}
                                                    </span>
                                                </div>
                                            </div>
                                        )})}
                                    </div>
                                </div>
                            )}

                            {/* --- New Document Tab (Sales) --- */}
                            {activeTab === 'new' && (
                                <div className="space-y-6 max-w-7xl pt-2">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
                                        <h2 className="text-3xl font-bold text-slate-800 flex items-center gap-3">
                                            <span className="w-3 h-3 bg-emerald-500 rounded-full"></span> {t.newDoc}
                                        </h2>
                                        <div className="flex gap-3">
                                            {currentInvoiceId && <button onClick={resetForm} className="bg-slate-200 text-slate-700 px-5 py-2.5 rounded-xl font-bold transition">{t.cancel}</button>}
                                            <button onClick={saveToFirebase} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition">{currentInvoiceId ? t.updateBtn : t.saveBtn}</button>
                                        </div>
                                    </div>
                                    
                                    {/* Multi-Select PI Linker */}
                                    <div className="bg-blue-50/50 p-5 rounded-2xl border border-blue-100 mb-6">
                                        <label className="font-bold text-blue-800 flex items-center gap-2 mb-3">
                                            <i className="fa-solid fa-link"></i> {t.linkPI}
                                        </label>
                                        <div className="flex flex-wrap gap-2">
                                            {purchaseInvoices.map(pi => (
                                                <button key={pi.id} onClick={() => toggleLinkPI(pi.id)} className={`px-4 py-2 rounded-xl text-sm font-medium border shadow-sm transition-all ${linkedPIs.includes(pi.id) ? 'bg-blue-600 text-white border-blue-600 scale-105' : 'bg-white text-slate-600 hover:bg-blue-50 border-slate-200'}`}>
                                                    {pi.purchaseNo || '-'} ({pi.supplier?.name || '-'}) 
                                                    {linkedPIs.includes(pi.id) ? <i className="fa-solid fa-xmark ml-2 text-blue-200 hover:text-white"></i> : <i className="fa-solid fa-plus ml-2 text-slate-400"></i>}
                                                </button>
                                            ))}
                                            {purchaseInvoices.length === 0 && <span className="text-sm text-slate-500">{t.noData}</span>}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.docNo} / {t.date}</h3>
                                            <div className="space-y-3">
                                                <input type="number" placeholder={t.docNo} value={invoiceNo} onChange={e => setInvoiceNo(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                <input type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.customerDetails}</h3>
                                            <div className="space-y-3">
                                                <div className="relative">
                                                    <input type="text" placeholder={t.customerName} value={customer.name} onChange={e => setCustomer({...customer, name: e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                    {customersList.length > 0 && !customer.name && (
                                                        <select onChange={e => {const c=customersList.find(c=>c.name===e.target.value); if(c) setCustomer(c);}} className="absolute left-0 top-0 w-6 h-full opacity-0 cursor-pointer"><option value="">...</option>{customersList.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select>
                                                    )}
                                                </div>
                                                <input type="text" placeholder={t.customerPhone} value={customer.phone} onChange={e => setCustomer({...customer, phone: e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.tradeInfo}</h3>
                                            <div className="space-y-3">
                                                <select value={incoterm} onChange={e => setIncoterm(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" dir="ltr"><option value="FOB">FOB</option><option value="EXW">EXW</option><option value="CIF">CIF</option><option value="CFR">CFR</option><option value="DAP">DAP</option></select>
                                                <input type="text" placeholder={t.port} value={port} onChange={e => setPort(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                <input type="text" placeholder={t.deliveryTime} value={deliveryTime} onChange={e => setDeliveryTime(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.settings}</h3>
                                            <div className="space-y-3">
                                                <select value={currency} onChange={e => setCurrency(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" dir="ltr">{Object.keys(currencies).map(k => <option key={k} value={k}>{currencies[k].name}</option>)}</select>
                                                <div className="flex items-center gap-2"><span className="text-xs text-slate-500">{t.commission}</span><input type="number" value={commission} onChange={e => setCommission(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" /></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 overflow-hidden">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-xl text-slate-800">{t.items}</h3>
                                            <button onClick={addItem} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm shadow-sm hover:bg-slate-900 transition"><i className="fa-solid fa-plus ml-1"></i> {t.addItem}</button>
                                        </div>
                                        <div className="overflow-x-auto mobile-scroll rounded-xl border border-slate-200">
                                            <table className="w-full text-sm border-collapse min-w-[950px]">
                                                <thead>
                                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-700">
                                                        <th className={`p-3 text-${t.dir==='rtl'?'right':'left'}`}>{t.itemName}</th><th className="p-3 w-28 text-center">{t.unitPrice}</th>
                                                        <th className="p-3 w-32 text-center">{t.qtyPerCtn}</th>
                                                        <th className="p-3 w-24 text-center">{t.ctnCount}</th>
                                                        <th className="p-3 text-center">{t.dimensions}</th><th className="p-3 w-24 text-center">{t.nwPerCtn}</th><th className="p-3 w-24 text-center">{t.gwPerCtn}</th><th className="p-3 w-10 text-center"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {items.map(item => (
                                                        <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                            <td className="p-2"><input type="text" value={item.name} onChange={e => handleItemChange(item.id, 'name', e.target.value)} className="w-full border rounded px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2"><input type="number" value={item.price} onChange={e => handleItemChange(item.id, 'price', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>

                    <div className="hidden print:block p-8 bg-white" dir="ltr">
                        <div className="border-b-2 border-gray-800 pb-4 mb-6 flex justify-between items-start">
                            <div><h1 className="text-3xl font-black uppercase tracking-tight">{company.name || 'COMPANY NAME'}</h1><p className="text-gray-600 mt-1 max-w-sm">{company.address}</p></div>
                            <div className="text-right"><h2 className="text-2xl font-bold text-gray-800 uppercase tracking-widest">{printType === 'invoice' ? t.invoiceTitle : t.packingTitle}</h2><p className="mt-2 text-sm font-bold">INV NO: {invoiceNo}</p><p className="text-sm">Date: {invoiceDate}</p></div>
                        </div>

                        <div className="mb-6 grid grid-cols-2 gap-4 text-sm">
                            <div className="border border-gray-300 p-3 rounded bg-gray-50/50 flex flex-wrap items-center gap-2">
                                <span className="font-bold text-gray-500 uppercase text-xs w-full mb-1">{t.billTo}</span>
                                <span className="font-bold text-base w-full block">{customer.name || '-'}</span>
                                {customer.phone && <span className="font-medium text-gray-700">{customer.phone}</span>}{customer.phone && customer.address && <span className="text-gray-300">|</span>}{customer.address && <span className="text-gray-600">{customer.address}</span>}
                            </div>
                            <div className="border border-gray-300 p-3 rounded bg-gray-50/50">
                                <table className="w-full text-xs">
                                    <tbody>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.incoterm}:</td><td className="font-medium text-right">{incoterm}</td></tr>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.port}:</td><td className="font-medium text-right">{port || '-'}</td></tr>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.deliveryTime}:</td><td className="font-medium text-right">{deliveryTime || '-'}</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {printType === 'invoice' && (
                            <>
                                <table className="w-full text-left border-collapse mb-8 text-sm">
                                    <thead><tr className="border-b-2 border-gray-800 bg-gray-100"><th className="py-2 px-2 uppercase font-bold text-gray-700">{t.itemName}</th><th className="py-2 px-2 text-center uppercase font-bold text-gray-700">Qty</th><th className="py-2 px-2 text-right uppercase font-bold text-gray-700">{t.unitPrice}</th><th className="py-2 px-2 text-right uppercase font-bold text-gray-700">Total Amount</th></tr></thead>
                                    <tbody>
                                        {items.map(i => {
                                            const qty = (Number(i.qtyPerCtn)||0) * (Number(i.ctnCount)||0);
                                            if (!i.name && qty === 0) return null; 
                                            return <tr key={i.id} className="border-b border-gray-200"><td className="py-2 px-2 font-medium">{i.name || '-'}</td><td className="py-2 px-2 text-center">{qty}</td><td className="py-2 px-2 text-right">{formatMoney(Number(i.price)||0, currency)}</td><td className="py-2 px-2 text-right font-bold">{formatMoney(qty * (Number(i.price)||0), currency)}</td></tr>
                                        })}
                                    </tbody>
                                </table>
                                <div className="flex justify-end mb-8">
                                    <div className="w-72">
                                        <div className="flex justify-between py-1 border-b border-gray-200 text-sm"><span>{t.subtotal}:</span><span className="font-medium">{formatMoney(totals.subtotal, currency)}</span></div>
                                        {Number(commission) > 0 && <div className="flex justify-between py-1 border-b border-gray-200 text-sm"><span>{t.commAmount} ({commission}%):</span><span className="font-medium">{formatMoney(totals.commAmount, currency)}</span></div>}
                                        <div className="flex justify-between py-2 text-lg font-bold border-b-2 border-gray-800 mt-1"><span>{t.grandTotal}:</span><span>{formatMoney(totals.grandTotal, currency)}</span></div>
                                    </div>
                                </div>
                            </>
                        )}

                        {printType === 'packing' && (
                            <>
                                <table className="w-full text-left border-collapse mb-8 text-sm">
                                    <thead><tr className="border-b-2 border-gray-800 bg-gray-100"><th className="py-2 px-2 uppercase font-bold text-gray-700">{t.itemName}</th><th className="py-2 px-2 text-center uppercase font-bold text-gray-700">{t.qtyPerCtn}</th><th className="py-2 px-2 text-center uppercase font-bold text-gray-700">CTNs</th><th className="py-2 px-2 text-center uppercase font-bold text-gray-700">Total Qty</th><th className="py-2 px-2 text-center uppercase font-bold text-gray-900 bg-gray-200">Total CBM</th><th className="py-2 px-2 text-right uppercase font-bold text-gray-700">NW (kg)</th><th className="py-2 px-2 text-right uppercase font-bold text-gray-700">GW (kg)</th></tr></thead>
                                    <tbody>
                                        {items.map(i => {
                                            const c = Number(i.ctnCount)||0, itemCBM = (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
                                            if (!i.name && c === 0) return null;
                                            return <tr key={i.id} className="border-b border-gray-200"><td className="py-2 px-2 font-medium">{i.name || '-'}</td><td className="py-2 px-2 text-center text-gray-600">{i.qtyPerCtn || 0}</td><td className="py-2 px-2 text-center text-gray-600">{c || 0}</td><td className="py-2 px-2 text-center font-bold text-gray-800">{(Number(i.qtyPerCtn)||0) * c}</td><td className="py-2 px-2 text-center font-bold text-gray-900 bg-gray-50/50">{itemCBM > 0 ? itemCBM.toFixed(3) : '-'}</td><td className="py-2 px-2 text-right text-gray-600">{((Number(i.nwPerCtn)||0) * c).toFixed(2)}</td><td className="py-2 px-2 text-right font-bold text-gray-800">{((Number(i.gwPerCtn)||0) * c).toFixed(2)}</td></tr>
                                        })}
                                    </tbody>
                                </table>
                                <div className="flex justify-end mb-8">
                                    <table className="w-80 text-sm border-2 border-gray-800">
                                        <tbody>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalCtns}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalCtns}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalQty}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalQty}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalNW}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalNW.toFixed(2)} kg</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalGW}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalGW.toFixed(2)} kg</td></tr>
                                            <tr><td className="py-2 px-3 bg-gray-800 text-white font-bold">{t.totalCBM}:</td><td className="py-2 px-3 text-right font-black text-lg bg-gray-100">{totals.totalCBM.toFixed(3)} m³</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {/* HIDE TERMS & CONDITIONS IN PACKING LIST */}
                        {(remarks || (printType === 'invoice' && selectedTerms.length > 0)) && (
                            <div className="mt-4 pt-4 border-t-2 border-dashed border-gray-300 text-sm break-inside-avoid">
                                {remarks && <div className="mb-4"><h4 className="font-bold text-gray-800 mb-1 uppercase">{t.remarksTitle}:</h4><p className="text-gray-700 whitespace-pre-wrap">{remarks}</p></div>}
                                {printType === 'invoice' && selectedTerms.length > 0 && (
                                    <div>
                                        <h4 className="font-bold text-gray-800 mb-2 uppercase">{t.termsTitle}:</h4>
                                        <ul className="list-disc pl-5 space-y-1 text-gray-700" dir={t.dir}>{selectedTerms.map(idx => <li key={idx}>{t.terms[idx]}</li>)}</ul>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
