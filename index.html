<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت لجستیک</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel for compiling React in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @media print {
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            @page { margin: 15mm; size: A4; }
        }
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
          apiKey: "AIzaSyCXfQHRm1bEP-pH-mXvdpRvoK3HTgOiG8M",
          authDomain: "logistics-app-7f2af.firebaseapp.com",
          projectId: "logistics-app-7f2af",
          storageBucket: "logistics-app-7f2af.firebasestorage.app",
          messagingSenderId: "935747514113",
          appId: "1:935747514113:web:ad11525289ccf2e9a93500"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const appId = 'logistics-app-v1';
        const getCollection = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

        const currencies = { USD: { symbol: '$', name: 'USD ($)' }, CNY: { symbol: '¥', name: 'CNY (¥)' }, IRR: { symbol: '﷼', name: 'IRR (﷼)' } };
        const emptyItem = () => ({ id: Date.now(), name: '', price: '', qtyPerCtn: '', ctnCount: '', l: '', w: '', h: '', nwPerCtn: '', gwPerCtn: '' });

        function App() {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('new');
          const [invoices, setInvoices] = useState([]);
          const [customersList, setCustomersList] = useState([]);
          const [loading, setLoading] = useState(true);
          const [searchQuery, setSearchQuery] = useState('');

          const [invoiceNo, setInvoiceNo] = useState('');
          const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
          const [currency, setCurrency] = useState('USD');
          const [commission, setCommission] = useState('');
          const [company, setCompany] = useState({ name: '', address: '' });
          const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
          const [items, setItems] = useState([{ id: 1, name: '', price: '', qtyPerCtn: '', ctnCount: '', l: '', w: '', h: '', nwPerCtn: '', gwPerCtn: '' }]);
          const [printType, setPrintType] = useState('invoice');

          const [editingCustomer, setEditingCustomer] = useState({ id: null, name: '', phone: '', address: '' });

          useEffect(() => {
            const initAuth = async () => {
              try {
                await signInAnonymously(auth);
              } catch (error) {
                console.warn("Auth init failed:", error.message);
                setUser({ uid: 'local-fallback-user', isFallback: true });
              }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              if (currentUser) setUser(currentUser);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            
            const unsubInvoices = onSnapshot(getCollection('invoices'), (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              data.sort((a, b) => b.timestamp - a.timestamp);
              setInvoices(data);
              
              if (data.length > 0) {
                const maxNo = Math.max(...data.map(i => Number(i.invoiceNo) || 0));
                setInvoiceNo(maxNo >= 2026001 ? maxNo + 1 : 2026001);
              } else {
                setInvoiceNo(2026001);
              }
              setLoading(false);
            }, (error) => {
              console.error(error);
              setLoading(false);
            });

            const unsubCustomers = onSnapshot(getCollection('customers'), (snapshot) => {
              setCustomersList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            });

            return () => { unsubInvoices(); unsubCustomers(); };
          }, [user]);

          const handleItemChange = (id, field, value) => setItems(items.map(i => i.id === id ? { ...i, [field]: value } : i));
          const addItem = () => setItems([...items, emptyItem()]);
          const removeItem = (id) => { if (items.length > 1) setItems(items.filter(i => i.id !== id)); };

          const handlePrint = (type) => {
            setPrintType(type);
            setTimeout(() => window.print(), 100); 
          };

          const saveToFirebase = async () => {
            if (!user) return alert("خطا: سیستم ابری هنوز متصل نشده است.");
            if (!invoiceNo) return alert("شماره فاکتور الزامی است");
            
            try {
              if (customer.name) {
                const existingCust = customersList.find(c => c.name === customer.name);
                if (existingCust) {
                  await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', existingCust.id), customer, { merge: true });
                } else {
                  await addDoc(getCollection('customers'), customer);
                }
              }

              await addDoc(getCollection('invoices'), {
                invoiceNo, date: invoiceDate, timestamp: Date.now(), company, customer, items,
                settings: { currency, commission }, totalAmount: totals.grandTotal, creatorId: user.uid
              });
              alert("سند با موفقیت ذخیره شد.");
              setActiveTab('invoices');
            } catch (error) {
              console.error(error);
              alert("خطا در ذخیره اطلاعات.");
            }
          };

          const loadRecord = (record) => {
            setInvoiceNo(record.invoiceNo || '');
            setInvoiceDate(record.date || new Date().toISOString().split('T')[0]);
            setCompany(record.company || {name:'', address:''});
            setCustomer(record.customer || {name:'', phone:'', address:''});
            setItems(record.items || []);
            setCurrency(record.settings?.currency || 'USD');
            setCommission(record.settings?.commission || '');
            setActiveTab('new');
          };

          const saveCustomerToCRM = async () => {
            if (!editingCustomer.name || !user) return;
            try {
              if (editingCustomer.id) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingCustomer.id), { name: editingCustomer.name, phone: editingCustomer.phone, address: editingCustomer.address }, { merge: true });
              } else {
                await addDoc(getCollection('customers'), { name: editingCustomer.name, phone: editingCustomer.phone, address: editingCustomer.address });
              }
              setEditingCustomer({ id: null, name: '', phone: '', address: '' });
            } catch (e) {
              console.error(e);
            }
          };

          const totals = useMemo(() => {
            let subtotal = 0, totalQty = 0, totalCtns = 0, totalCBM = 0, totalNW = 0, totalGW = 0;
            items.forEach(i => {
              const q = Number(i.qtyPerCtn) || 0;
              const c = Number(i.ctnCount) || 0;
              const p = Number(i.price) || 0;
              const qty = q * c;
              totalQty += qty; subtotal += qty * p; totalCtns += c;
              totalCBM += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
              totalNW += (Number(i.nwPerCtn)||0) * c; totalGW += (Number(i.gwPerCtn)||0) * c;
            });
            const commAmount = subtotal * ((Number(commission)||0) / 100);
            return { subtotal, commAmount, grandTotal: subtotal + commAmount, totalQty, totalCtns, totalCBM, totalNW, totalGW };
          }, [items, commission]);

          const formatMoney = (amount) => `${currencies[currency]?.symbol || '$'} ${amount.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

          const filteredInvoices = invoices.filter(inv => 
            (inv.customer?.name || '').includes(searchQuery) ||
            (inv.invoiceNo || '').toString().includes(searchQuery) ||
            (inv.date || '').includes(searchQuery)
          );

          return (
            <div>
              <div className="flex h-screen print:hidden">
                <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col">
                  <h1 className="text-2xl font-bold mb-8 text-blue-400">پنل لجستیک</h1>
                  <nav className="space-y-2 flex-grow">
                    <button onClick={() => setActiveTab('dashboard')} className={`block w-full text-right p-3 rounded ${activeTab === 'dashboard' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>داشبورد</button>
                    <button onClick={() => setActiveTab('new')} className={`block w-full text-right p-3 rounded ${activeTab === 'new' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>ثبت سند جدید</button>
                    <button onClick={() => setActiveTab('invoices')} className={`block w-full text-right p-3 rounded ${activeTab === 'invoices' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>تاریخچه اسناد</button>
                    <button onClick={() => setActiveTab('customers')} className={`block w-full text-right p-3 rounded ${activeTab === 'customers' ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>لیست مشتریان</button>
                  </nav>
                  <div className="text-xs text-slate-500 mt-auto text-center">
                    {user?.isFallback ? `متصل در حالت تستی` : (user ? `متصل به سرور ابری` : `در حال اتصال...`)}
                  </div>
                </aside>

                <main className="flex-1 p-8 overflow-y-auto">
                  {activeTab === 'dashboard' && (
                    <div>
                      <h2 className="text-2xl font-bold mb-6">داشبورد آماری</h2>
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow text-center">
                          <div className="text-slate-500 mb-2">کل اسناد صادر شده</div>
                          <div className="text-4xl font-bold text-blue-600">{invoices.length}</div>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow text-center">
                          <div className="text-slate-500 mb-2">مشتریان ثبت شده</div>
                          <div className="text-4xl font-bold text-emerald-600">{customersList.length}</div>
                        </div>
                      </div>
                    </div>
                  )}

                  {activeTab === 'customers' && (
                    <div className="max-w-5xl">
                      <h2 className="text-2xl font-bold mb-6">مدیریت مشتریان</h2>
                      <div className="bg-white rounded-xl shadow p-5 mb-6 flex gap-4 items-end">
                        <div className="flex-1">
                          <label className="block text-sm mb-1">نام مشتری</label>
                          <input type="text" value={editingCustomer.name} onChange={e => setEditingCustomer({...editingCustomer, name: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                        </div>
                        <div className="flex-1">
                          <label className="block text-sm mb-1">تلفن</label>
                          <input type="text" value={editingCustomer.phone} onChange={e => setEditingCustomer({...editingCustomer, phone: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                        </div>
                        <div className="flex-1">
                          <label className="block text-sm mb-1">آدرس</label>
                          <input type="text" value={editingCustomer.address} onChange={e => setEditingCustomer({...editingCustomer, address: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                        </div>
                        <button onClick={saveCustomerToCRM} className="bg-blue-600 text-white px-6 py-2 rounded h-10">{editingCustomer.id ? 'بروزرسانی' : 'ثبت جدید'}</button>
                      </div>
                      <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-right border-collapse text-sm">
                          <thead><tr className="bg-slate-100 border-b">
                            <th className="p-4">نام</th><th className="p-4">تلفن</th><th className="p-4">آدرس</th><th className="p-4 w-24">عملیات</th>
                          </tr></thead>
                          <tbody>
                            {customersList.map(c => (
                              <tr key={c.id} className="border-b hover:bg-slate-50">
                                <td className="p-4">{c.name}</td><td className="p-4">{c.phone}</td><td className="p-4">{c.address}</td>
                                <td className="p-4"><button onClick={() => setEditingCustomer(c)} className="text-blue-600 hover:underline">ویرایش</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {activeTab === 'invoices' && (
                    <div>
                      <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold">اسناد ابری</h2>
                        <input type="text" placeholder="جستجو (نام مشتری، تاریخ، شماره)..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="border rounded-lg px-4 py-2 w-80 text-sm shadow-sm" />
                      </div>
                      <div className="bg-white rounded-xl shadow overflow-hidden">
                        <table className="w-full text-right border-collapse">
                          <thead><tr className="bg-slate-100 border-b text-sm">
                            <th className="p-4">شماره فاکتور</th><th className="p-4">نام مشتری</th><th className="p-4">تاریخ</th><th className="p-4">مبلغ کل</th><th className="p-4">عملیات</th>
                          </tr></thead>
                          <tbody>
                            {filteredInvoices.map(inv => (
                              <tr key={inv.id} className="border-b hover:bg-slate-50">
                                <td className="p-4">{inv.invoiceNo || '-'}</td><td className="p-4">{inv.customer.name}</td><td className="p-4 text-sm">{inv.date}</td><td className="p-4 font-bold">{inv.totalAmount.toLocaleString()}</td>
                                <td className="p-4"><button onClick={() => loadRecord(inv)} className="text-blue-600 hover:underline text-sm bg-blue-50 px-3 py-1 rounded">فراخوانی</button></td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                  {activeTab === 'new' && (
                    <div className="space-y-6 max-w-6xl">
                      <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold">ثبت سند جدید</h2>
                        <button onClick={saveToFirebase} disabled={!user} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-bold shadow">ذخیره در دیتابیس</button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div className="bg-white rounded-xl shadow p-5">
                          <h3 className="font-bold border-b pb-2 mb-3">مشخصات فاکتور</h3>
                          <div className="space-y-2">
                            <label className="text-xs text-gray-500 block">شماره فاکتور</label>
                            <input type="number" value={invoiceNo} onChange={e => setInvoiceNo(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" />
                            <label className="text-xs text-gray-500 block mt-2">تاریخ</label>
                            <input type="date" value={invoiceDate} onChange={e => setInvoiceDate(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" />
                          </div>
                        </div>
                        <div className="bg-white rounded-xl shadow p-5">
                          <h3 className="font-bold border-b pb-2 mb-3">مشخصات مشتری</h3>
                          <div className="space-y-2 relative">
                            <input type="text" placeholder="نام مشتری" value={customer.name} onChange={e => setCustomer({...customer, name: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                            {customersList.length > 0 && !customer.name && (
                              <select onChange={e => setCustomer({ name: e.target.value, phone: '', address: '' })} className="absolute left-0 top-0 w-5 h-10 opacity-0 cursor-pointer">
                                <option value="">انتخاب...</option>
                                {customersList.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                              </select>
                            )}
                            <input type="text" placeholder="شماره تماس" value={customer.phone} onChange={e => setCustomer({...customer, phone: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                            <input type="text" placeholder="آدرس" value={customer.address} onChange={e => setCustomer({...customer, address: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                          </div>
                        </div>
                        <div className="bg-white rounded-xl shadow p-5">
                          <h3 className="font-bold border-b pb-2 mb-3">مشخصات شرکت</h3>
                          <div className="space-y-2">
                            <input type="text" placeholder="نام شرکت" value={company.name} onChange={e => setCompany({...company, name: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                            <input type="text" placeholder="آدرس" value={company.address} onChange={e => setCompany({...company, address: e.target.value})} className="w-full border rounded px-3 py-2 text-sm" />
                          </div>
                        </div>
                        <div className="bg-white rounded-xl shadow p-5">
                          <h3 className="font-bold border-b pb-2 mb-3">تنظیمات مالی</h3>
                          <div className="space-y-2">
                            <select value={currency} onChange={e => setCurrency(e.target.value)} className="w-full border rounded px-3 py-2 text-sm">
                              {Object.keys(currencies).map(k => <option key={k} value={k}>{currencies[k].name}</option>)}
                            </select>
                            <div className="flex items-center gap-2">
                              <span className="text-sm w-24">کارمزد (%)</span>
                              <input type="number" value={commission} onChange={e => setCommission(e.target.value)} className="w-full border rounded px-3 py-2 text-sm" />
                            </div>
                          </div>
                        </div>
                      </div>
                      <div className="bg-white rounded-xl shadow p-6">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold">لیست اقلام</h3>
                          <button onClick={addItem} className="bg-slate-800 text-white px-3 py-1 rounded text-sm">+ افزودن</button>
                        </div>
                        <div className="overflow-x-auto">
                          <table className="w-full text-right text-sm">
                            <thead><tr className="bg-slate-100 border-b">
                              <th className="p-2">نام کالا</th><th className="p-2 w-24">قیمت واحد</th><th className="p-2 w-20">تعداد/کارتن</th>
                              <th className="p-2 w-20">کارتن</th><th className="p-2 text-center">ابعاد(cm)</th><th className="p-2 w-20">NW(kg)</th><th className="p-2 w-20">GW(kg)</th><th className="p-2 w-10"></th>
                            </tr></thead>
                            <tbody>
                              {items.map(i => (
                                <tr key={i.id} className="border-b">
                                  <td className="p-1"><input type="text" value={i.name} onChange={e => handleItemChange(i.id, 'name', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1"><input type="number" value={i.price} onChange={e => handleItemChange(i.id, 'price', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1"><input type="number" value={i.qtyPerCtn} onChange={e => handleItemChange(i.id, 'qtyPerCtn', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1"><input type="number" value={i.ctnCount} onChange={e => handleItemChange(i.id, 'ctnCount', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1 flex justify-center gap-1">
                                    <input type="number" placeholder="L" value={i.l} onChange={e => handleItemChange(i.id, 'l', e.target.value)} className="w-10 border rounded p-1 text-center" />
                                    <input type="number" placeholder="W" value={i.w} onChange={e => handleItemChange(i.id, 'w', e.target.value)} className="w-10 border rounded p-1 text-center" />
                                    <input type="number" placeholder="H" value={i.h} onChange={e => handleItemChange(i.id, 'h', e.target.value)} className="w-10 border rounded p-1 text-center" />
                                  </td>
                                  <td className="p-1"><input type="number" value={i.nwPerCtn} onChange={e => handleItemChange(i.id, 'nwPerCtn', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1"><input type="number" value={i.gwPerCtn} onChange={e => handleItemChange(i.id, 'gwPerCtn', e.target.value)} className="w-full border rounded p-1" /></td>
                                  <td className="p-1 text-center"><button onClick={() => removeItem(i.id)} className="text-red-500">✕</button></td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                      <div className="flex justify-end gap-4 mt-6">
                        <button onClick={() => handlePrint('packing')} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-bold shadow">چاپ پکینگ لیست</button>
                        <button onClick={() => handlePrint('invoice')} className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold shadow">چاپ فاکتور</button>
                      </div>
                    </div>
                  )}
                </main>
              </div>

              {/* Print Template */}
              <div className="hidden print:block p-8" dir="ltr">
                <div className="border-b-2 border-gray-800 pb-4 mb-6 flex justify-between items-start">
                  <div><h1 className="text-3xl font-bold uppercase">{company.name || 'COMPANY NAME'}</h1><p className="text-gray-600 mt-1 max-w-sm">{company.address}</p></div>
                  <div className="text-right">
                    <h2 className="text-3xl font-bold text-gray-800 uppercase">{printType === 'invoice' ? 'COMMERCIAL INVOICE' : 'PACKING LIST'}</h2>
                    <p className="mt-2 text-sm font-bold">INV NO: {invoiceNo}</p><p className="text-sm">Date: {invoiceDate}</p>
                  </div>
                </div>
                <div className="mb-6 bg-gray-50 p-4 border rounded">
                  <h3 className="font-bold mb-2">Bill To:</h3><p className="font-medium text-lg">{customer.name || '-'}</p><p className="text-sm">{customer.phone}</p><p className="text-sm">{customer.address}</p>
                </div>
                {printType === 'invoice' && (
                  <>
                    <table className="w-full text-left border-collapse mb-8">
                      <thead><tr className="border-b-2 border-gray-800 bg-gray-50"><th className="py-2 px-2">Item Name</th><th className="py-2 px-2 text-center">Qty</th><th className="py-2 px-2 text-right">Unit Price</th><th className="py-2 px-2 text-right">Total Amount</th></tr></thead>
                      <tbody>
                        {items.map(i => {
                          const qty = (Number(i.qtyPerCtn)||0) * (Number(i.ctnCount)||0);
                          return (
                            <tr key={i.id} className="border-b border-gray-200">
                              <td className="py-2 px-2 font-medium">{i.name || '-'}</td><td className="py-2 px-2 text-center">{qty}</td><td className="py-2 px-2 text-right">{formatMoney(Number(i.price)||0)}</td><td className="py-2 px-2 text-right font-bold">{formatMoney(qty * (Number(i.price)||0))}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                    <div className="flex justify-end"><div className="w-64">
                      <div className="flex justify-between py-1 border-b border-gray-300"><span>Subtotal:</span><span>{formatMoney(totals.subtotal)}</span></div>
                      {Number(commission) > 0 && <div className="flex justify-between py-1 border-b border-gray-300"><span>Commission ({commission}%):</span><span>{formatMoney(totals.commAmount)}</span></div>}
                      <div className="flex justify-between py-2 text-lg font-bold border-b-2 border-gray-800"><span>Grand Total:</span><span>{formatMoney(totals.grandTotal)}</span></div>
                    </div></div>
                  </>
                )}
                {printType === 'packing' && (
                  <>
                    <table className="w-full text-left border-collapse mb-8 text-sm">
                      <thead><tr className="border-b-2 border-gray-800 bg-gray-50"><th className="py-2 px-1">Item Name</th><th className="py-2 px-1 text-center">Qty/CTN</th><th className="py-2 px-1 text-center">CTNs</th><th className="py-2 px-1 text-center">Total Qty</th><th className="py-2 px-1 text-center">Dim (L×W×H)</th><th className="py-2 px-1 text-right">NW (kg)</th><th className="py-2 px-1 text-right">GW (kg)</th></tr></thead>
                      <tbody>
                        {items.map(i => {
                          const c = Number(i.ctnCount)||0;
                          return(
                            <tr key={i.id} className="border-b border-gray-200">
                              <td className="py-2 px-1 font-medium">{i.name || '-'}</td><td className="py-2 px-1 text-center">{i.qtyPerCtn || 0}</td><td className="py-2 px-1 text-center">{i.ctnCount || 0}</td>
                              <td className="py-2 px-1 text-center font-bold">{(Number(i.qtyPerCtn)||0) * c}</td><td className="py-2 px-1 text-center text-gray-600">{i.l||0}×{i.w||0}×{i.h||0}</td>
                              <td className="py-2 px-1 text-right">{((Number(i.nwPerCtn)||0) * c).toFixed(2)}</td><td className="py-2 px-1 text-right font-bold">{((Number(i.gwPerCtn)||0) * c).toFixed(2)}</td>
                            </tr>
                          )
                        })}
                      </tbody>
                    </table>
                    <div className="flex justify-end mt-8">
                      <table className="w-72 text-sm border-2 border-gray-800">
                        <tbody>
                          <tr className="border-b border-gray-300"><td className="py-2 px-4 bg-gray-50">Total Cartons:</td><td className="py-2 px-4 text-right font-bold">{totals.totalCtns}</td></tr>
                          <tr className="border-b border-gray-300"><td className="py-2 px-4 bg-gray-50">Total Quantity:</td><td className="py-2 px-4 text-right font-bold">{totals.totalQty}</td></tr>
                          <tr className="border-b border-gray-300"><td className="py-2 px-4 bg-gray-50">Total Net Weight:</td><td className="py-2 px-4 text-right font-bold">{totals.totalNW.toFixed(2)} kg</td></tr>
                          <tr className="border-b border-gray-300"><td className="py-2 px-4 bg-gray-50">Total Gross Weight:</td><td className="py-2 px-4 text-right font-bold">{totals.totalGW.toFixed(2)} kg</td></tr>
                          <tr><td className="py-2 px-4 bg-gray-800 text-white font-bold">Total CBM:</td><td className="py-2 px-4 text-right font-bold text-lg">{totals.totalCBM.toFixed(3)} m³</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </>
                )}
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
