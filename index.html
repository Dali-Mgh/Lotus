<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>LOTUS ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; margin: 0; padding: 20px; }
            .print-only { display: block !important; }
            @page { margin: 0.5cm; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const TERMS_LIST = [
            "Payment terms : 100% T/T",
            "Payment terms : 20% deposit 80% 1week before loading",
            "Payment terms : 50% deposit 50% 1week before loading",
            "Payment should be made within 7 days after invoice date.",
            "Buyer is responsible for import duties, taxes, and customs clearance.",
            "Goods will be inspected before shipment.",
            "Late payment may result in storage or interest charges.",
            "Exchange rate fluctuations are the buyer’s responsibility."
        ];

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState("dashboard");
            
            const [invoices, setInvoices] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [transactions, setTransactions] = useState([]);

            const [invForm, setInvForm] = useState({ number: "", customer: "", amount: "", type: "FOB", port: "", deliveryDate: "", notes: "", terms: [], curr: "USD" });
            const [expForm, setExpForm] = useState({ title: "", amount: "", curr: "USD", date: "" });
            const [finForm, setFinForm] = useState({ customer: "", amount: "", type: "credit", curr: "USD", date: "" });

            const confirmDelete = (id, list, setList) => {
                if (window.confirm("آیا از حذف این سند اطمینان دارید؟") && window.confirm("هشدار نهایی: این عمل غیرقابل بازگشت است. حذف شود؟")) {
                    setList(list.filter(item => item.id !== id));
                }
            };

            const saveInvoice = () => {
                if(invoices.some(i => i.number === invForm.number)) return alert("شماره فاکتور تکراری است!");
                if(!invForm.number || !invForm.customer || !invForm.amount) return alert("اطلاعات ناقص است.");
                
                setInvoices([...invoices, { ...invForm, id: Date.now() }]);
                setTransactions([...transactions, { id: Date.now(), customer: invForm.customer, amount: parseFloat(invForm.amount), type: "debit", curr: invForm.curr, date: new Date().toLocaleDateString() }]);
                setInvForm({ number: "", customer: "", amount: "", type: "FOB", port: "", deliveryDate: "", notes: "", terms: [], curr: "USD" });
            };

            const saveExpense = () => {
                if(!expForm.title || !expForm.amount) return;
                setExpenses([...expenses, { ...expForm, id: Date.now() }]);
                setExpForm({ title: "", amount: "", curr: "USD", date: "" });
            };

            const saveTransaction = () => {
                if(!finForm.customer || !finForm.amount) return;
                setTransactions([...transactions, { ...finForm, id: Date.now(), amount: parseFloat(finForm.amount) }]);
                setFinForm({ customer: "", amount: "", type: "credit", curr: "USD", date: "" });
            };

            const toggleTerm = (term) => {
                setInvForm(prev => ({
                    ...prev,
                    terms: prev.terms.includes(term) ? prev.terms.filter(t => t !== term) : [...prev.terms, term]
                }));
            };

            const calcTotal = (list, currFilter) => list.filter(i => i.curr === currFilter).reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
            
            const getCustomerBalance = (customer, currFilter) => {
                const customerTrans = transactions.filter(t => t.customer === customer && t.curr === currFilter);
                const debits = customerTrans.filter(t => t.type === "debit").reduce((sum, t) => sum + t.amount, 0);
                const credits = customerTrans.filter(t => t.type === "credit").reduce((sum, t) => sum + t.amount, 0);
                return credits - debits;
            };

            const uniqueCustomers = [...new Set(transactions.map(t => t.customer))];

            if (!isLoggedIn) {
                return (
                    <div className="flex items-center justify-center h-screen bg-slate-900">
                        <div className="bg-slate-800 p-8 rounded-lg shadow-lg w-96 text-center">
                            <h2 className="text-2xl text-blue-400 font-bold mb-6">LOTUS ERP</h2>
                            <button onClick={() => setIsLoggedIn(true)} className="w-full p-3 bg-blue-600 hover:bg-blue-700 text-white rounded font-bold">ورود</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-white text-slate-800">
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col no-print">
                        <h1 className="text-2xl font-bold mb-8 text-blue-400 text-center">LOTUS ERP</h1>
                        <nav className="space-y-2 flex-grow">
                            {['dashboard', 'invoices', 'expenses', 'finance'].map(tab => (
                                <button key={tab} onClick={() => setActiveTab(tab)} className={`block w-full text-right p-3 rounded ${activeTab === tab ? 'bg-blue-600' : 'hover:bg-slate-800'}`}>
                                    {tab === 'dashboard' ? 'داشبورد' : tab === 'invoices' ? 'اسناد و فاکتورها' : tab === 'expenses' ? 'هزینه‌ها' : 'امور مالی'}
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => setIsLoggedIn(false)} className="w-full p-2 mt-4 bg-red-600 hover:bg-red-700 text-white rounded">خروج</button>
                    </aside>
                    
                    <main className="flex-1 p-8 overflow-y-auto">
                        {activeTab === 'dashboard' && (
                            <div className="no-print">
                                <h2 className="text-2xl font-bold mb-6">داشبورد مالی</h2>
                                <div className="grid grid-cols-3 gap-4 mb-8">
                                    {['USD', 'CNY', 'IRR'].map(c => (
                                        <div key={c} className="bg-slate-100 p-4 border rounded shadow-sm">
                                            <h3 className="font-bold text-lg mb-2 border-b pb-2">آمار {c}</h3>
                                            <p className="text-green-600">کل فروش: {calcTotal(invoices, c).toLocaleString()}</p>
                                            <p className="text-red-600">کل هزینه‌ها: {calcTotal(expenses, c).toLocaleString()}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'invoices' && (
                            <div>
                                <div className="no-print bg-slate-50 p-4 border rounded mb-6">
                                    <h2 className="text-xl font-bold mb-4">صدور فاکتور جدید</h2>
                                    <div className="grid grid-cols-4 gap-4 mb-4">
                                        <input placeholder="شماره فاکتور" value={invForm.number} onChange={e => setInvForm({...invForm, number: e.target.value})} className="border p-2 rounded" />
                                        <input placeholder="نام مشتری" value={invForm.customer} onChange={e => setInvForm({...invForm, customer: e.target.value})} className="border p-2 rounded" />
                                        <input type="number" placeholder="مبلغ کل" value={invForm.amount} onChange={e => setInvForm({...invForm, amount: e.target.value})} className="border p-2 rounded" />
                                        <select value={invForm.curr} onChange={e => setInvForm({...invForm, curr: e.target.value})} className="border p-2 rounded">
                                            <option value="USD">دلار</option><option value="CNY">یوان</option><option value="IRR">ریال</option>
                                        </select>
                                        <select value={invForm.type} onChange={e => setInvForm({...invForm, type: e.target.value})} className="border p-2 rounded">
                                            <option value="FOB">FOB</option><option value="EXW">EXW</option><option value="CIF">CIF</option>
                                        </select>
                                        <input placeholder="پورت مبدا/مقصد" value={invForm.port} onChange={e => setInvForm({...invForm, port: e.target.value})} className="border p-2 rounded" />
                                        <input type="date" placeholder="زمان تحویل" value={invForm.deliveryDate} onChange={e => setInvForm({...invForm, deliveryDate: e.target.value})} className="border p-2 rounded" />
                                    </div>
                                    <textarea placeholder="توضیحات فاکتور..." value={invForm.notes} onChange={e => setInvForm({...invForm, notes: e.target.value})} className="border p-2 rounded w-full mb-4 h-20"></textarea>
                                    
                                    <h3 className="font-bold mb-2">شرایط قرارداد (تیک بزنید):</h3>
                                    <div className="grid grid-cols-2 gap-2 mb-4 text-sm" dir="ltr">
                                        {TERMS_LIST.map((term, idx) => (
                                            <label key={idx} className="flex items-center gap-2">
                                                <input type="checkbox" checked={invForm.terms.includes(term)} onChange={() => toggleTerm(term)} />
                                                {term}
                                            </label>
                                        ))}
                                    </div>
                                    <button onClick={saveInvoice} className="bg-blue-600 text-white px-4 py-2 rounded">ثبت فاکتور</button>
                                </div>

                                <div className="no-print">
                                    <h2 className="text-xl font-bold mb-4">لیست فاکتورها</h2>
                                    <table className="w-full text-right border-collapse border">
                                        <thead>
                                            <tr className="bg-slate-200"><th className="border p-2">شماره</th><th className="border p-2">مشتری</th><th className="border p-2">مبلغ</th><th className="border p-2">نوع</th><th className="border p-2">عملیات</th></tr>
                                        </thead>
                                        <tbody>
                                            {invoices.map(inv => (
                                                <tr key={inv.id}>
                                                    <td className="border p-2">{inv.number}</td><td className="border p-2">{inv.customer}</td><td className="border p-2">{inv.amount} {inv.curr}</td><td className="border p-2">{inv.type} - {inv.port}</td>
                                                    <td className="border p-2">
                                                        <button onClick={() => window.print()} className="text-blue-600 ml-4">چاپ</button>
                                                        <button onClick={() => confirmDelete(inv.id, invoices, setInvoices)} className="text-red-600">حذف</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                
                                <div className="hidden print-only" dir="ltr">
                                    <h1 className="text-3xl font-bold text-center mb-8 border-b pb-4">COMMERCIAL INVOICE</h1>
                                    {invoices.length > 0 && (
                                        <div>
                                            <div className="flex justify-between mb-8">
                                                <div>
                                                    <p><strong>Invoice No:</strong> {invoices[invoices.length-1].number}</p>
                                                    <p><strong>Customer:</strong> {invoices[invoices.length-1].customer}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p><strong>Term:</strong> {invoices[invoices.length-1].type}</p>
                                                    <p><strong>Port:</strong> {invoices[invoices.length-1].port}</p>
                                                    <p><strong>Delivery:</strong> {invoices[invoices.length-1].deliveryDate}</p>
                                                </div>
                                            </div>
                                            <p className="mb-4"><strong>Total Amount:</strong> {invoices[invoices.length-1].amount} {invoices[invoices.length-1].curr}</p>
                                            <div className="mb-8 p-4 border bg-gray-50 min-h-[100px]">{invoices[invoices.length-1].notes}</div>
                                            <h3 className="font-bold mb-2">Terms & Conditions:</h3>
                                            <ul className="list-disc pl-5">
                                                {invoices[invoices.length-1].terms.map((t, i) => <li key={i}>{t}</li>)}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                        {activeTab === 'expenses' && (
                            <div className="no-print">
                                <h2 className="text-xl font-bold mb-4">ثبت هزینه مستقل</h2>
                                <div className="flex gap-4 mb-6">
                                    <input placeholder="شرح هزینه" value={expForm.title} onChange={e => setExpForm({...expForm, title: e.target.value})} className="border p-2 rounded flex-1" />
                                    <input type="number" placeholder="مبلغ" value={expForm.amount} onChange={e => setExpForm({...expForm, amount: e.target.value})} className="border p-2 rounded" />
                                    <select value={expForm.curr} onChange={e => setExpForm({...expForm, curr: e.target.value})} className="border p-2 rounded">
                                        <option value="USD">دلار</option><option value="CNY">یوان</option><option value="IRR">ریال</option>
                                    </select>
                                    <input type="date" value={expForm.date} onChange={e => setExpForm({...expForm, date: e.target.value})} className="border p-2 rounded" />
                                    <button onClick={saveExpense} className="bg-red-600 text-white px-4 py-2 rounded">ثبت هزینه</button>
                                </div>
                                
                                <table className="w-full text-right border-collapse border">
                                    <thead><tr className="bg-slate-200"><th className="border p-2">شرح</th><th className="border p-2">مبلغ</th><th className="border p-2">تاریخ</th><th className="border p-2">عملیات</th></tr></thead>
                                    <tbody>
                                        {expenses.map(exp => (
                                            <tr key={exp.id}>
                                                <td className="border p-2">{exp.title}</td><td className="border p-2">{exp.amount} {exp.curr}</td><td className="border p-2">{exp.date}</td>
                                                <td className="border p-2"><button onClick={() => confirmDelete(exp.id, expenses, setExpenses)} className="text-red-600">حذف</button></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {activeTab === 'finance' && (
                            <div className="no-print">
                                <h2 className="text-xl font-bold mb-4">دفتر کل مشتریان (دریافت/پرداخت)</h2>
                                <div className="flex gap-4 mb-6">
                                    <input placeholder="نام مشتری" value={finForm.customer} onChange={e => setFinForm({...finForm, customer: e.target.value})} className="border p-2 rounded" />
                                    <input type="number" placeholder="مبلغ" value={finForm.amount} onChange={e => setFinForm({...finForm, amount: e.target.value})} className="border p-2 rounded" />
                                    <select value={finForm.curr} onChange={e => setFinForm({...finForm, curr: e.target.value})} className="border p-2 rounded">
                                        <option value="USD">دلار</option><option value="CNY">یوان</option><option value="IRR">ریال</option>
                                    </select>
                                    <select value={finForm.type} onChange={e => setFinForm({...finForm, type: e.target.value})} className="border p-2 rounded">
                                        <option value="credit">دریافتی از مشتری (بستانکار)</option><option value="debit">بدهی جدید به ما (بدهکار)</option>
                                    </select>
                                    <input type="date" value={finForm.date} onChange={e => setFinForm({...finForm, date: e.target.value})} className="border p-2 rounded" />
                                    <button onClick={saveTransaction} className="bg-green-600 text-white px-4 py-2 rounded">ثبت تراکنش</button>
                                </div>

                                <h3 className="font-bold text-lg mb-4 mt-8 border-b pb-2">مانده حساب مشتریان</h3>
                                <table className="w-full text-right border-collapse border">
                                    <thead><tr className="bg-slate-200"><th className="border p-2">مشتری</th><th className="border p-2">تراز USD</th><th className="border p-2">تراز CNY</th><th className="border p-2">تراز IRR</th></tr></thead>
                                    <tbody>
                                        {uniqueCustomers.map(cust => (
                                            <tr key={cust}>
                                                <td className="border p-2 font-bold">{cust}</td>
                                                <td className="border p-2" dir="ltr">{getCustomerBalance(cust, 'USD').toLocaleString()}</td>
                                                <td className="border p-2" dir="ltr">{getCustomerBalance(cust, 'CNY').toLocaleString()}</td>
                                                <td className="border p-2" dir="ltr">{getCustomerBalance(cust, 'IRR').toLocaleString()}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
