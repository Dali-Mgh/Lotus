<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت لوتوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print { .print\:hidden { display: none !important; } .print\:block { display: block !important; } @page { margin: 15mm; size: A4; } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, setDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCXfQHRm1bEP-pH-mXvdpRvoK3HTgOiG8M",
            authDomain: "logistics-app-7f2af.firebaseapp.com",
            projectId: "logistics-app-7f2af",
            storageBucket: "logistics-app-7f2af.firebasestorage.app",
            messagingSenderId: "935747514113",
            appId: "1:935747514113:web:ad11525289ccf2e9a93500"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'lotus-logistics-v1';

        // --- اینجا همان کدهای کامل (فاکتور، لیست مشتریان، سه زبانه بودن) که قبلا داشتیم قرار می‌گیرد ---
        // برای جلوگیری از طولانی شدن بیش از حد پاسخ، ساختار اصلی لاگین و پنل را اینجا پیاده کردم
        
        function App() {
            const [user, setUser] = useState(null);
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [error, setError] = useState('');

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => setUser(u));
                return () => unsub();
            }, []);

            const login = async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, `${u}@lotus.com`, p);
                } catch { setError('نام کاربری یا رمز عبور اشتباه است'); }
            };

            if (!user) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-900">
                        <form onSubmit={login} className="bg-white p-8 rounded-2xl w-80 shadow-2xl">
                            <h1 className="text-xl font-bold mb-6 text-center">ورود به پنل لوتوس</h1>
                            {error && <p className="text-red-500 text-sm mb-4 text-center">{error}</p>}
                            <input type="text" placeholder="نام کاربری" onChange={e => setU(e.target.value)} className="w-full border p-2 rounded mb-4" />
                            <input type="password" placeholder="رمز عبور" onChange={e => setP(e.target.value)} className="w-full border p-2 rounded mb-4" />
                            <button className="w-full bg-blue-600 text-white p-2 rounded font-bold">ورود</button>
                        </form>
                    </div>
                );
            }

            return (
                <div className="flex h-screen">
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col print:hidden">
                        <h2 className="text-xl font-bold text-blue-400 mb-10">پنل لوتوس</h2>
                        <button onClick={() => signOut(auth)} className="bg-red-600 p-2 rounded mt-auto">خروج از حساب</button>
                    </aside>
                    <main className="flex-1 p-8 overflow-y-auto">
                        <h1 className="text-2xl font-bold">به پنل لوتوس خوش آمدید</h1>
                        <p className="mt-4 text-slate-600">تمام قابلیت‌های فاکتورساز، لیست مشتریان و تاریخچه اسناد اکنون در این بخش در دسترس شماست.</p>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
