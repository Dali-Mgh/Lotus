                terms: [

        function App() {
            // --- Global State ---
            const [user, setUser] = useState(null);
            const [u, setU] = useState('');
            const [p, setP] = useState('');
            const [loginError, setLoginError] = useState('');
            const [loading, setLoading] = useState(true);

            // --- Modal State (No alerts/confirms) ---
            const [modal, setModal] = useState({ isOpen: false, type: 'info', title: '', message: '', onConfirm: null });
            const showModal = (type, title, message, onConfirm = null) => setModal({ isOpen: true, type, title, message, onConfirm });
            const closeModal = () => setModal({ ...modal, isOpen: false });

            // --- App State ---
            const [activeTab, setActiveTab] = useState('new');
            const [invoices, setInvoices] = useState([]);
            const [customersList, setCustomersList] = useState([]);
            const [transactions, setTransactions] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [lang, setLang] = useState('fa');

            // --- Form State ---
            const [currentInvoiceId, setCurrentInvoiceId] = useState(null);
            const [invoiceNo, setInvoiceNo] = useState('');
            const [invoiceDate, setInvoiceDate] = useState(new Date().toISOString().split('T')[0]);
            const [currency, setCurrency] = useState('USD');
            const [commission, setCommission] = useState('');
            const [company, setCompany] = useState({ name: '', address: '' });
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            
            // New Form States for Updates 5,6,7
            const [incoterm, setIncoterm] = useState('FOB');
            const [deliveryTime, setDeliveryTime] = useState('');
            const [port, setPort] = useState('');
            const [remarks, setRemarks] = useState('');
            const [selectedTerms, setSelectedTerms] = useState([]); // Array of indexes

            const [items, setItems] = useState([emptyItem()]);
            const [printType, setPrintType] = useState('invoice');
            
            // Exchange Rate State
            const [exchangeRate, setExchangeRate] = useState({ usdToCny: null, loading: true });

            // Accounting Form State
            const [paymentForm, setPaymentForm] = useState({ customerName: '', amount: '', currency: 'USD', date: new Date().toISOString().split('T')[0], description: '' });

            const t = translations[lang];

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    setLoading(false);
                });
                
                // Fetch Exchange Rate (Live USD to CNY)
                fetch('https://api.exchangerate-api.com/v4/latest/USD')
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.rates && data.rates.CNY) {
                            setExchangeRate({ usdToCny: data.rates.CNY, loading: false });
                        }
                    })
                    .catch(() => setExchangeRate({ usdToCny: 'Error', loading: false }));

                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                const unsubInvoices = onSnapshot(getCollection('invoices'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setInvoices(data);
                    
                    if (!currentInvoiceId) {
                         if (data.length > 0) {
                             const maxNo = Math.max(...data.map(i => Number(i.invoiceNo) || 0));
                             setInvoiceNo(maxNo >= 2026001 ? maxNo + 1 : 2026001);
                         } else {
                             setInvoiceNo(2026001);
                         }
                    }
                });

                const unsubCustomers = onSnapshot(getCollection('customers'), (snapshot) => {
                    setCustomersList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const unsubTransactions = onSnapshot(getCollection('transactions'), (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => b.timestamp - a.timestamp);
                    setTransactions(data);
                });

                return () => { unsubInvoices(); unsubCustomers(); unsubTransactions(); };
            }, [user, currentInvoiceId]);

            const login = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    await setPersistence(auth, browserSessionPersistence);
                    await signInWithEmailAndPassword(auth, `${u}@lotus.com`, p);
                } catch { 
                    setLoginError(lang === 'fa' ? 'نام کاربری یا رمز عبور اشتباه است' : 'Invalid username or password'); 
                }
            };

            const resetForm = () => {
                setCurrentInvoiceId(null);
                setInvoiceDate(new Date().toISOString().split('T')[0]);
                setCompany({ name: '', address: '' });
                setCustomer({ name: '', phone: '', address: '' });
                setItems([emptyItem()]);
                setCurrency('USD');
                setCommission('');
                setIncoterm('FOB');
                setDeliveryTime('');
                setPort('');
                setRemarks('');
                setSelectedTerms([]);
            };

            const handleTabSwitch = (tab) => {
                if(tab === 'new') resetForm();
                setActiveTab(tab);
            };

            const toggleTerm = (index) => {
                if (selectedTerms.includes(index)) {
                    setSelectedTerms(selectedTerms.filter(i => i !== index));
                } else {
                    setSelectedTerms([...selectedTerms, index]);
                }
            };

            const handleItemChange = (id, field, value) => setItems(items.map(i => i.id === id ? { ...i, [field]: value } : i));
            const addItem = () => setItems([...items, emptyItem()]);
            const removeItem = (id) => { if (items.length > 1) setItems(items.filter(i => i.id !== id)); };

            const saveToFirebase = async () => {
                if (!invoiceNo) {
                    showModal('error', 'خطا', lang === 'fa' ? "شماره فاکتور الزامی است" : "Invoice number is required");
                    return;
                }

                // Check for unique Invoice Number
                if (!currentInvoiceId) {
                    const exists = invoices.find(inv => String(inv.invoiceNo) === String(invoiceNo));
                    if (exists) {
                        showModal('error', 'خطا', lang === 'fa' ? "این شماره فاکتور قبلاً در سیستم ثبت شده است! اجازه ذخیره تکراری وجود ندارد." : "This invoice number already exists!");
                        return;
                    }
                }

                try {
                    if (customer.name) {
                        const existingCust = customersList.find(c => c.name === customer.name);
                        if (!existingCust) {
                            await addDoc(getCollection('customers'), customer);
                        } else {
                            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', existingCust.id), customer, { merge: true });
                        }
                    }

                    const payload = {
                        invoiceNo, date: invoiceDate, timestamp: Date.now(), company, customer, items,
                        settings: { currency, commission }, 
                        trade: { incoterm, deliveryTime, port },
                        remarks, selectedTerms,
                        totalAmount: totals.grandTotal, creatorId: user.uid
                    };

                    if (currentInvoiceId) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', currentInvoiceId), payload, { merge: true });
                    } else {
                        await addDoc(getCollection('invoices'), payload);
                    }
                    
                    showModal('success', 'موفقیت', t.savedSuccess);
                    setActiveTab('invoices');
                } catch (error) {
                    console.error(error);
                    showModal('error', 'خطا', "Error saving data.");
                }
            };

            const requestDeleteInvoice = (id, invoiceNum) => {
                showModal('confirm', 'تایید حذف', `آیا از حذف فاکتور شماره ${invoiceNum} اطمینان دارید؟ این عمل غیرقابل بازگشت است.`, async () => {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', id));
                        showModal('success', 'موفق', 'فاکتور با موفقیت حذف شد.');
                    } catch (e) {
                        showModal('error', 'خطا', 'مشکلی در حذف پیش آمد.');
                    }
                });
            };

            const loadRecord = (record) => {
                setCurrentInvoiceId(record.id);
                setInvoiceNo(record.invoiceNo || '');
                setInvoiceDate(record.date || new Date().toISOString().split('T')[0]);
                setCompany(record.company || {name:'', address:''});
                setCustomer(record.customer || {name:'', phone:'', address:''});
                setItems(record.items || [emptyItem()]);
                setCurrency(record.settings?.currency || 'USD');
                setCommission(record.settings?.commission || '');
                
                setIncoterm(record.trade?.incoterm || 'FOB');
                setDeliveryTime(record.trade?.deliveryTime || '');
                setPort(record.trade?.port || '');
                setRemarks(record.remarks || '');
                setSelectedTerms(record.selectedTerms || []);
                
                setActiveTab('new');
            };

            const handlePrint = (type) => {
                setPrintType(type);
                setTimeout(() => window.print(), 100); 
            };

            const savePayment = async () => {
                if (!paymentForm.customerName || !paymentForm.amount) {
                    showModal('error', 'خطا', 'نام مشتری و مبلغ الزامی است.');
                    return;
                }
                try {
                    await addDoc(getCollection('transactions'), {
                        ...paymentForm,
                        amount: Number(paymentForm.amount),
                        timestamp: Date.now()
                    });
                    showModal('success', 'موفقیت', 'تراکنش مالی با موفقیت ثبت شد.');
                    setPaymentForm({ ...paymentForm, amount: '', description: '' });
                } catch(e) {
                    showModal('error', 'خطا', 'خطا در ثبت تراکنش.');
                }
            };

            const totals = useMemo(() => {
                let subtotal = 0, totalQty = 0, totalCtns = 0, totalCBM = 0, totalNW = 0, totalGW = 0;
                items.forEach(i => {
                    const q = Number(i.qtyPerCtn) || 0;
                    const c = Number(i.ctnCount) || 0;
                    const p = Number(i.price) || 0;
                    const qty = q * c;
                    totalQty += qty; subtotal += qty * p; totalCtns += c;
                    totalCBM += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
                    totalNW += (Number(i.nwPerCtn)||0) * c; totalGW += (Number(i.gwPerCtn)||0) * c;
                });
                const commAmount = subtotal * ((Number(commission)||0) / 100);
                return { subtotal, commAmount, grandTotal: subtotal + commAmount, totalQty, totalCtns, totalCBM, totalNW, totalGW };
            }, [items, commission]);

            // Dashboard Stats
            const dashboardStats = useMemo(() => {
                let amtUSD = 0, amtCNY = 0, cbm = 0;
                invoices.forEach(inv => {
                    if (inv.settings?.currency === 'USD') amtUSD += Number(inv.totalAmount) || 0;
                    else if (inv.settings?.currency === 'CNY') amtCNY += Number(inv.totalAmount) || 0;
                    
                    (inv.items || []).forEach(i => {
                        cbm += (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * (Number(i.ctnCount)||0);
                    });
                });
                return { totalAmountUSD: amtUSD, totalAmountCNY: amtCNY, totalCBM: cbm };
            }, [invoices]);

            // Calculate Balance for a customer
            const getCustomerBalance = (customerName) => {
                let usdInv = 0, cnyInv = 0;
                invoices.filter(i => i.customer?.name === customerName).forEach(i => {
                    if(i.settings?.currency === 'USD') usdInv += (Number(i.totalAmount)||0);
                    if(i.settings?.currency === 'CNY') cnyInv += (Number(i.totalAmount)||0);
                });
                
                let usdPaid = 0, cnyPaid = 0;
                transactions.filter(t => t.customerName === customerName).forEach(t => {
                    if(t.currency === 'USD') usdPaid += (Number(t.amount)||0);
                    if(t.currency === 'CNY') cnyPaid += (Number(t.amount)||0);
                });

                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.customerDetails}</h3>
                                            <div className="space-y-3">
                                                <div className="relative">
                                                    <input type="text" placeholder={t.customerName} value={customer.name} onChange={e => setCustomer({...customer, name: e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                    {customersList.length > 0 && !customer.name && (
                                                        <select onChange={e => handleCustomerSelect(customersList.find(c => c.name === e.target.value))} className="absolute left-0 top-0 w-6 h-full opacity-0 cursor-pointer">
                                                            <option value="">...</option>
                                                            {customersList.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                                        </select>
                                                    )}
                                                </div>
                                                <input type="text" placeholder={t.customerPhone} value={customer.phone} onChange={e => setCustomer({...customer, phone: e.target.value})} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>
                                        
                                        {/* Trade Info (Update 7) */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.tradeInfo}</h3>
                                            <div className="space-y-3">
                                                <select value={incoterm} onChange={e => setIncoterm(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" dir="ltr">
                                                    <option value="FOB">FOB</option><option value="EXW">EXW</option><option value="CIF">CIF</option><option value="CFR">CFR</option><option value="DAP">DAP</option>
                                                </select>
                                                <input type="text" placeholder={t.port} value={port} onChange={e => setPort(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                <input type="text" placeholder={t.deliveryTime} value={deliveryTime} onChange={e => setDeliveryTime(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                            </div>
                                        </div>

                                        {/* Settings */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-3">{t.settings}</h3>
                                            <div className="space-y-3">
                                                <select value={currency} onChange={e => setCurrency(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" dir="ltr">
                                                    {Object.keys(currencies).map(k => <option key={k} value={k}>{currencies[k].name}</option>)}
                                                </select>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs text-slate-500">{t.commission}</span>
                                                    <input type="number" value={commission} onChange={e => setCommission(e.target.value)} className="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:ring-1 focus:ring-blue-500" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Items Table */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 overflow-hidden">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="font-bold text-xl text-slate-800">{t.items}</h3>
                                            <button onClick={addItem} className="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm shadow-sm hover:bg-slate-900 transition"><i className="fa-solid fa-plus ml-1"></i> {t.addItem}</button>
                                        </div>
                                        <div className="overflow-x-auto rounded-xl border border-slate-200">
                                            <table className="w-full text-sm border-collapse min-w-[900px]">
                                                <thead>
                                                    <tr className="bg-slate-50 border-b border-slate-200 text-slate-700">
                                                        <th className={`p-3 text-${t.dir==='rtl'?'right':'left'}`}>{t.itemName}</th>
                                                        <th className="p-3 w-28 text-center">{t.unitPrice}</th><th className="p-3 w-24 text-center">{t.qtyPerCtn}</th><th className="p-3 w-24 text-center">{t.ctnCount}</th>
                                                        <th className="p-3 text-center">{t.dimensions}</th><th className="p-3 w-24 text-center">{t.nwPerCtn}</th><th className="p-3 w-24 text-center">{t.gwPerCtn}</th><th className="p-3 w-10 text-center"></th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {items.map((item, index) => (
                                                        <tr key={item.id} className="border-b border-slate-100 hover:bg-slate-50">
                                                            <td className="p-2"><input type="text" value={item.name} onChange={e => handleItemChange(item.id, 'name', e.target.value)} className="w-full border rounded px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2"><input type="number" value={item.price} onChange={e => handleItemChange(item.id, 'price', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2"><input type="number" value={item.qtyPerCtn} onChange={e => handleItemChange(item.id, 'qtyPerCtn', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2"><input type="number" value={item.ctnCount} onChange={e => handleItemChange(item.id, 'ctnCount', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2 flex justify-center gap-1">
                                                                <input type="number" placeholder="L" value={item.l} onChange={e => handleItemChange(item.id, 'l', e.target.value)} className="dim-input" />×
                                                                <input type="number" placeholder="W" value={item.w} onChange={e => handleItemChange(item.id, 'w', e.target.value)} className="dim-input" />×
                                                                <input type="number" placeholder="H" value={item.h} onChange={e => handleItemChange(item.id, 'h', e.target.value)} className="dim-input" />
                                                            </td>
                                                            <td className="p-2"><input type="number" value={item.nwPerCtn} onChange={e => handleItemChange(item.id, 'nwPerCtn', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2"><input type="number" value={item.gwPerCtn} onChange={e => handleItemChange(item.id, 'gwPerCtn', e.target.value)} className="w-full border rounded px-2 py-1.5 text-center outline-none focus:ring-1 focus:ring-blue-500" /></td>
                                                            <td className="p-2 text-center"><button onClick={() => removeItem(item.id)} className="text-red-400 hover:text-red-600"><i className="fa-solid fa-trash"></i></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Remarks & Terms (Updates 5 & 6) */}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {/* Remarks */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-4">{t.remarksTitle}</h3>
                                            <textarea 
                                                value={remarks} onChange={e => setRemarks(e.target.value)} 
                                                className="w-full h-40 border border-slate-300 rounded-lg p-3 text-sm outline-none focus:ring-1 focus:ring-blue-500 resize-none"
                                                placeholder="..."
                                            ></textarea>
                                        </div>
                                        {/* Terms & Conditions Checkboxes */}
                                        <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                                            <h3 className="font-bold text-slate-800 border-b pb-2 mb-4">{t.termsTitle}</h3>
                                            <div className="space-y-3 h-40 overflow-y-auto pr-2">
                                                {t.terms.map((term, idx) => (
                                                    <label key={idx} className="flex items-start gap-3 cursor-pointer group">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={selectedTerms.includes(idx)} 
                                                            onChange={() => toggleTerm(idx)} 
                                                            className="mt-1 w-4 h-4 text-blue-600 rounded border-gray-300 cursor-pointer"
                                                        />
                                                        <span className="text-sm text-slate-700 group-hover:text-slate-900 transition-colors leading-tight" dir="auto">{term}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex flex-col sm:flex-row justify-end gap-4 mt-8 pb-8">
                                        <button onClick={() => handlePrint('packing')} className="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3.5 rounded-xl font-bold shadow-lg transition flex items-center justify-center gap-3">
                                            <i className="fa-solid fa-box-open text-lg"></i> {t.printPacking}
                                        </button>
                                        <button onClick={() => handlePrint('invoice')} className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3.5 rounded-xl font-bold shadow-lg transition flex items-center justify-center gap-3">
                                            <i className="fa-solid fa-file-invoice-dollar text-lg"></i> {t.printInvoice}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* --- PRINT TEMPLATE (Fully Refined for Updates) --- */}
                    <div className="hidden print:block p-8 bg-white" dir="ltr">
                        {/* Header */}
                        <div className="border-b-2 border-gray-800 pb-4 mb-6 flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-black uppercase tracking-tight">{company.name || 'COMPANY NAME'}</h1>
                                <p className="text-gray-600 mt-1 max-w-sm">{company.address}</p>
                            </div>
                            <div className="text-right">
                                <h2 className="text-2xl font-bold text-gray-800 uppercase tracking-widest">{printType === 'invoice' ? t.invoiceTitle : t.packingTitle}</h2>
                                <p className="mt-2 text-sm font-bold">INV NO: {invoiceNo}</p>
                                <p className="text-sm">Date: {invoiceDate}</p>
                            </div>
                        </div>

                        {/* Customer & Trade Info */}
                        <div className="mb-6 grid grid-cols-2 gap-4 text-sm">
                            <div className="border border-gray-300 p-3 rounded bg-gray-50/50 flex flex-wrap items-center gap-2">
                                <span className="font-bold text-gray-500 uppercase text-xs w-full mb-1">{t.billTo}</span>
                                <span className="font-bold text-base w-full block">{customer.name || '-'}</span>
                                {customer.phone && <span className="font-medium text-gray-700">{customer.phone}</span>}
                                {customer.phone && customer.address && <span className="text-gray-300">|</span>}
                                {customer.address && <span className="text-gray-600">{customer.address}</span>}
                            </div>
                            
                            {/* Trade Info Print */}
                            <div className="border border-gray-300 p-3 rounded bg-gray-50/50">
                                <table className="w-full text-xs">
                                    <tbody>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.incoterm}:</td><td className="font-medium text-right">{incoterm}</td></tr>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.port}:</td><td className="font-medium text-right">{port || '-'}</td></tr>
                                        <tr><td className="py-1 font-bold text-gray-500 uppercase">{t.deliveryTime}:</td><td className="font-medium text-right">{deliveryTime || '-'}</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Invoice Table */}
                        {printType === 'invoice' && (
                            <>
                                <table className="w-full text-left border-collapse mb-8 text-sm">
                                    <thead>
                                        <tr className="border-b-2 border-gray-800 bg-gray-100">
                                            <th className="py-2 px-2 uppercase font-bold text-gray-700">{t.itemName}</th>
                                            <th className="py-2 px-2 text-center uppercase font-bold text-gray-700">Qty</th>
                                            <th className="py-2 px-2 text-right uppercase font-bold text-gray-700">{t.unitPrice}</th>
                                            <th className="py-2 px-2 text-right uppercase font-bold text-gray-700">Total Amount</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {items.map(i => {
                                            const qty = (Number(i.qtyPerCtn)||0) * (Number(i.ctnCount)||0);
                                            if (!i.name && qty === 0) return null; 
                                            return (
                                                <tr key={i.id} className="border-b border-gray-200">
                                                    <td className="py-2 px-2 font-medium">{i.name || '-'}</td>
                                                    <td className="py-2 px-2 text-center">{qty}</td>
                                                    <td className="py-2 px-2 text-right">{formatMoney(Number(i.price)||0)}</td>
                                                    <td className="py-2 px-2 text-right font-bold">{formatMoney(qty * (Number(i.price)||0))}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                                <div className="flex justify-end mb-8">
                                    <div className="w-72">
                                        <div className="flex justify-between py-1 border-b border-gray-200 text-sm"><span>{t.subtotal}:</span><span className="font-medium">{formatMoney(totals.subtotal)}</span></div>
                                        {Number(commission) > 0 && <div className="flex justify-between py-1 border-b border-gray-200 text-sm"><span>{t.commAmount} ({commission}%):</span><span className="font-medium">{formatMoney(totals.commAmount)}</span></div>}
                                        <div className="flex justify-between py-2 text-lg font-bold border-b-2 border-gray-800 mt-1"><span>{t.grandTotal}:</span><span>{formatMoney(totals.grandTotal)}</span></div>
                                    </div>
                                </div>
                            </>
                        )}

                        {/* Packing List Table (Update 4) */}
                        {printType === 'packing' && (
                            <>
                                <table className="w-full text-left border-collapse mb-8 text-sm">
                                    <thead>
                                        <tr className="border-b-2 border-gray-800 bg-gray-100">
                                            <th className="py-2 px-2 uppercase font-bold text-gray-700">{t.itemName}</th>
                                            <th className="py-2 px-2 text-center uppercase font-bold text-gray-700">{t.qtyPerCtn}</th>
                                            <th className="py-2 px-2 text-center uppercase font-bold text-gray-700">CTNs</th>
                                            <th className="py-2 px-2 text-center uppercase font-bold text-gray-700">Total Qty</th>
                                            <th className="py-2 px-2 text-center uppercase font-bold text-gray-900 bg-gray-200">Total CBM</th>
                                            <th className="py-2 px-2 text-right uppercase font-bold text-gray-700">NW (kg)</th>
                                            <th className="py-2 px-2 text-right uppercase font-bold text-gray-700">GW (kg)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {items.map(i => {
                                            const c = Number(i.ctnCount)||0;
                                            const itemCBM = (((Number(i.l)||0) * (Number(i.w)||0) * (Number(i.h)||0)) / 1000000) * c;
                                            if (!i.name && c === 0) return null;
                                            return(
                                                <tr key={i.id} className="border-b border-gray-200">
                                                    <td className="py-2 px-2 font-medium">{i.name || '-'}</td>
                                                    <td className="py-2 px-2 text-center text-gray-600">{i.qtyPerCtn || 0}</td>
                                                    <td className="py-2 px-2 text-center text-gray-600">{c || 0}</td>
                                                    <td className="py-2 px-2 text-center font-bold text-gray-800">{(Number(i.qtyPerCtn)||0) * c}</td>
                                                    <td className="py-2 px-2 text-center font-bold text-gray-900 bg-gray-50/50">{itemCBM > 0 ? itemCBM.toFixed(3) : '-'}</td>
                                                    <td className="py-2 px-2 text-right text-gray-600">{((Number(i.nwPerCtn)||0) * c).toFixed(2)}</td>
                                                    <td className="py-2 px-2 text-right font-bold text-gray-800">{((Number(i.gwPerCtn)||0) * c).toFixed(2)}</td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                                <div className="flex justify-end mb-8">
                                    <table className="w-80 text-sm border-2 border-gray-800">
                                        <tbody>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalCtns}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalCtns}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalQty}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalQty}</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalNW}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalNW.toFixed(2)} kg</td></tr>
                                            <tr className="border-b border-gray-300"><td className="py-2 px-3 bg-gray-50">{t.totalGW}:</td><td className="py-2 px-3 text-right font-bold">{totals.totalGW.toFixed(2)} kg</td></tr>
                                            <tr><td className="py-2 px-3 bg-gray-800 text-white font-bold">{t.totalCBM}:</td><td className="py-2 px-3 text-right font-black text-lg bg-gray-100">{totals.totalCBM.toFixed(3)} m³</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {/* Remarks & Terms Print Section (Updates 5 & 6) */}
                        {(remarks || selectedTerms.length > 0) && (
                            <div className="mt-4 pt-4 border-t-2 border-dashed border-gray-300 text-sm break-inside-avoid">
                                {remarks && (
                                    <div className="mb-4">
                                        <h4 className="font-bold text-gray-800 mb-1 uppercase">{t.remarksTitle}:</h4>
                                        <p className="text-gray-700 whitespace-pre-wrap">{remarks}</p>
                                    </div>
                                )}
                                {selectedTerms.length > 0 && (
                                    <div>
                                        <h4 className="font-bold text-gray-800 mb-2 uppercase">{t.termsTitle}:</h4>
                                        <ul className="list-disc pl-5 space-y-1 text-gray-700" dir={t.dir}>
                                            {selectedTerms.map(idx => (
                                                <li key={idx}>{t.terms[idx]}</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
