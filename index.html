<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل لجستیک لوتوس</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f8fafc; }
        @media print { .print\:hidden { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCXfQHRm1bEP-pH-mXvdpRvoK3HTgOiG8M",
            authDomain: "logistics-app-7f2af.firebaseapp.com",
            projectId: "logistics-app-7f2af",
            storageBucket: "logistics-app-7f2af.firebasestorage.app",
            messagingSenderId: "935747514113",
            appId: "1:935747514113:web:ad11525289ccf2e9a93500"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        function LoginPage({ onLogin }) {
            const [user, setUser] = useState('');
            const [pass, setPass] = useState('');
            const [err, setErr] = useState('');

            const doLogin = async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, `${user}@lotus.com`, pass);
                } catch { setErr('نام کاربری یا رمز عبور اشتباه است'); }
            };

            return (
                <div className="flex h-screen items-center justify-center bg-slate-900">
                    <form onSubmit={doLogin} className="bg-white p-8 rounded-2xl shadow-2xl w-80">
                        <h1 className="text-2xl font-bold text-center mb-6">ورود به لوتوس</h1>
                        {err && <p className="text-red-500 text-sm mb-4 text-center">{err}</p>}
                        <input type="text" placeholder="نام کاربری" onChange={e => setUser(e.target.value)} className="w-full border p-2 rounded mb-4" />
                        <input type="password" placeholder="رمز عبور" onChange={e => setPass(e.target.value)} className="w-full border p-2 rounded mb-4" />
                        <button type="submit" className="w-full bg-blue-600 text-white p-2 rounded font-bold">ورود</button>
                    </form>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [checking, setChecking] = useState(true);

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setChecking(false);
                });
                return () => unsub();
            }, []);

            if (checking) return <div className="flex h-screen items-center justify-center">در حال بررسی...</div>;
            if (!user) return <LoginPage />;

            return (
                <div className="h-screen flex">
                    <aside className="w-64 bg-slate-900 text-white p-6 flex flex-col">
                        <h2 className="text-xl font-bold text-blue-400 mb-10">پنل لوتوس</h2>
                        <button onClick={() => signOut(auth)} className="mt-auto bg-red-600 p-2 rounded text-sm">خروج از حساب</button>
                    </aside>
                    <main className="flex-1 p-8">
                        <h1 className="text-2xl">خوش آمدید!</h1>
                        <p>سیستم امن شد. اکنون فقط با یوزرنیم/پسورد وارد می‌شوید.</p>
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
